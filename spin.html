<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamCash Spin</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#020617,#111827,#1e1b4b);
min-height:100vh;
text-align:center;
color:#fff;
}

.header{
background:linear-gradient(135deg,#06b6d4,#2563eb,#7c3aed);
padding:20px;
font-size:24px;
font-weight:bold;
box-shadow:0 5px 20px #0006;
}

.card{
background:rgba(255,255,255,0.12);
margin:25px auto;
padding:25px;
border-radius:28px;
max-width:420px;
box-shadow:0 15px 35px #0008;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.25);
}

.wheel{
width:285px;
height:285px;
border-radius:50%;
margin:25px auto;
border:10px solid #ff2bd6;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:bold;
color:#fff;
text-shadow:0 3px 8px #000;
box-shadow:0 0 25px #ff2bd6, inset 0 0 20px #0006;
background:conic-gradient(
#facc15 0 60deg,
#fb923c 60deg 120deg,
#22c55e 120deg 180deg,
#0ea5e9 180deg 240deg,
#a855f7 240deg 300deg,
#ec4899 300deg 360deg
);
}

.btn{
padding:13px 24px;
border:none;
border-radius:28px;
background:linear-gradient(135deg,#7c3aed,#ec4899,#06b6d4);
color:white;
font-weight:bold;
margin:7px;
box-shadow:0 8px 0 #312e81,0 12px 20px #0007;
}

.btn:active{
transform:translateY(5px);
box-shadow:0 3px 0 #312e81;
}

.back{
background:linear-gradient(135deg,#16a34a,#22c55e,#86efac);
box-shadow:0 8px 0 #166534,0 12px 20px #0007;
}

.history{
background:rgba(255,255,255,0.15);
margin:18px auto;
padding:15px;
border-radius:18px;
max-width:420px;
text-align:left;
box-shadow:0 8px 25px #0005;
}
</style>
</head>
<body>

<div class="header">🎡 DreamCash Lucky Spin</div>

<div class="card">
<h3 id="statusText">Checking...</h3>
<p id="spinLeftText">Today Spins Left: 0</p>

<div id="spinWheel" class="wheel">SPIN</div>

<button class="btn" onclick="startSpin()">Spin Now</button>
<button class="btn" onclick="loadSpinHistory()">Spin History</button>
<button class="btn back" onclick="window.location.href='dashboard.html'">Back Dashboard</button>
</div>

<div id="historyBox"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqiuuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7UOrWf2JPMefVzPAQRw_mjTphJ_1";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const rewards = [0.10,0.15,0.20,0.25,0.30];

function getMemberId(){
const params = new URLSearchParams(window.location.search);
return params.get("member_id") || "";
}

function todayDate(){
return new Date().toISOString().split("T")[0];
}

async function isActiveUser(){
const memberId = getMemberId();

if(!memberId){
alert("Please login again");
window.location.href="login.html";
return false;
}

const { data, error } = await supabaseClient
.from("users")
.select("status")
.eq("member_id", memberId)
.maybeSingle();

if(error || !data) return false;

const status = String(data.status || "").trim().toLowerCase();
return status === "active" || status === "approved";
}

async function getSpinData(){
const memberId = getMemberId();
const today = todayDate();

const { data } = await supabaseClient
.from("daily_claims")
.select("*")
.eq("user_id", memberId)
.eq("task_type", "spin")
.eq("claim_date", today)
.maybeSingle();

const used = data ? Number(data.claim_count || 0) : 0;

return {
left: 5 - used,
row: data
};
}

async function updateSpinText(){
const active = await isActiveUser();

if(!active){
document.getElementById("statusText").innerText = "🔴 Inactive User - Activate ID First";
document.getElementById("spinLeftText").innerText = "Spin Locked";
return;
}

document.getElementById("statusText").innerText = "✅ Active User";
const spinData = await getSpinData();
document.getElementById("spinLeftText").innerText = "Today Spins Left: " + spinData.left;
}

async function startSpin(){
const active = await isActiveUser();

if(!active){
alert("Please activate your ID first");
return;
}

const memberId = getMemberId();
const spinData = await getSpinData();

if(spinData.left <= 0){
alert("No spins left today. Come back tomorrow.");
return;
}

const reward = rewards[Math.floor(Math.random() * rewards.length)];
const wheel = document.getElementById("spinWheel");

wheel.style.transition = "transform 4s ease-out";
wheel.style.transform = "rotate(" + (1800 + Math.floor(Math.random()*360)) + "deg)";

setTimeout(async function(){

const today = todayDate();

if(spinData.row){
const newCount = Number(spinData.row.claim_count || 0) + 1;

const { error } = await supabaseClient
.from("daily_claims")
.update({
claim_count: newCount,
points: Math.round(reward * 100)
})
.eq("id", spinData.row.id);

if(error){
alert("Spin save error");
return;
}

}else{
const { error } = await supabaseClient
.from("daily_claims")
.insert({
user_id: memberId,
task_type: "spin",
claim_date: today,
points: Math.round(reward * 100),
claim_count: 1
});

if(error){
alert("Spin save error");
return;
}
}

const { data: userData, error: userError } = await supabaseClient
.from("users")
.select("wallet")
.eq("member_id", memberId)
.maybeSingle();

if(userError || !userData){
alert("Wallet fetch error");
return;
}

const newWallet = Number(userData.wallet || 0) + reward;

const { error: walletError } = await supabaseClient
.from("users")
.update({ wallet: newWallet })
.eq("member_id", memberId);

if(walletError){
alert("Wallet update error");
return;
}

await updateSpinText();
alert("Congratulations! You won " + reward.toFixed(2) + " DC");

},4000);
}

async function loadSpinHistory(){
const memberId = getMemberId();

const { data, error } = await supabaseClient
.from("daily_claims")
.select("*")
.eq("user_id", memberId)
.eq("task_type", "spin")
.order("claim_date", { ascending:false })
.limit(20);

if(error || !data || data.length === 0){
document.getElementById("historyBox").innerHTML =
"<div class='history'>No Spin History Found</div>";
return;
}

let html = "<div class='history'><h3>Spin History</h3>";

data.forEach(item=>{
html += "<p>Date: " + item.claim_date +
" | Count: " + item.claim_count +
" | Points: " + item.points + "</p>";
});

html += "</div>";
document.getElementById("historyBox").innerHTML = html;
}

updateSpinText();
</script>

</body>
</html>
