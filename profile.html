<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>
  <style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}

.container{
    max-width:420px;
    margin:40px auto;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    text-align:center;
}

img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #22c55e;
}

input{
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
  </style>
</head>

<body>

<h2 style="text-align:center;">Profile Picture</h2>
<div class="container">

  <img id="profilePreview"
       src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
       style="width:140px;height:140px;border-radius:50%;border:4px solid #2196f3;object-fit:cover;">

  <br><br>

  <input type="file" id="photoInput" accept="image/*">

  <br><br>

  <button id="uploadBtn">Upload Photo</button>

  <br><br>

  <button onclick="location.href='dashboard.html'">Back</button>

</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("profilePreview");

photoInput.addEventListener("change", function () {
    const file = photoInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        preview.src = e.target.result;
    };

    reader.readAsDataURL(file);

});
</script>
</body>
</html>
