<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>
  <style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}

.container{
    max-width:420px;
    margin:40px auto;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    text-align:center;
}

img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #22c55e;
}

input{
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
    .id-card-section{
    margin-top:30px;
}

.id-card{
    width:320px;
    margin:0 auto;
    padding:22px;
    border-radius:22px;
    background:linear-gradient(135deg,rgba(205,127,50,0.95),rgba(80,45,20,0.95));
    box-shadow:0 20px 40px rgba(0,0,0,0.45);
    color:white;
    text-align:center;
    transform:perspective(900px) rotateX(4deg);
    border:1px solid rgba(255,255,255,0.35);
}

.id-card h3{
    margin:0 0 12px;
    font-size:20px;
}

.id-card img{
    width:95px;
    height:95px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    background:#fff;
}

.id-card .name{
    font-size:21px;
    font-weight:bold;
    margin-top:12px;
}

.id-card .info{
    font-size:14px;
    margin-top:6px;
}

.card-status{
    display:inline-block;
    margin-top:10px;
    padding:6px 14px;
    border-radius:20px;
    background:#22c55e;
    font-size:13px;
    font-weight:bold;
}

.download-card-btn{
    margin-top:18px;
    background:#0ea5e9;
}
  </style>
</head>

<body>

<h2 style="text-align:center;">Profile Picture</h2>
<div class="container">

  <img id="profilePreview"
       src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
       style="width:140px;height:140px;border-radius:50%;border:4px solid #2196f3;object-fit:cover;">

  <br><br>

  <input type="file" id="photoInput" accept="image/*">

  <br><br>

  <button id="uploadBtn">Upload Photo</button>

  <br><br>

  <button onclick="location.href='dashboard.html'">Back</button>
<div class="id-card-section">

    <div class="id-card" id="dreamCard">
        <h3>DreamCash Identity Card</h3>

        <img id="cardPhoto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

        <div class="name" id="cardName">DreamCash User</div>

        <div class="info">User ID: <span id="cardUserId">DC037</span></div>

        <div class="info">Rank: <span id="cardRank">Bronze</span></div>

        <div class="card-status" id="cardStatus">Active</div>
    </div>

    <button class="download-card-btn" id="downloadCardBtn">
        Download ID Card
    </button>

</div>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("profilePreview");

photoInput.addEventListener("change", function () {
    const file = photoInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        preview.src = e.target.result;
    };

    reader.readAsDataURL(file);

});
  document.getElementById("uploadBtn").addEventListener("click", async function () {
    const file = photoInput.files[0];

    if (!file) {
        alert("Please choose a photo first");
        return;
    }

    const fileName = Date.now() + "_" + file.name;

const { error } = await supabaseClient.storage
  .from("avatars")
  .upload(fileName, file);

if (error) {
  alert(error.message);
  return;
}

const imageUrl =
  SUPABASE_URL + "/storage/v1/object/public/avatars/" + fileName;
localStorage.setItem("profilePhoto", imageUrl);
alert("Photo uploaded successfully!");

console.log(imageUrl);
});
</script>
</body>
</html>
