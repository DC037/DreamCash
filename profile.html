<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}

.container{
    max-width:420px;
    margin:40px auto;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    text-align:center;
}

#profilePreview{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #2196f3;
}

input{
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

.id-card-section{
    margin-top:30px;
}

.id-card{
    width:300px;
    margin:0 auto;
    padding:22px 18px;
    border-radius:26px;
    color:white;
    text-align:center;
    background:
      linear-gradient(135deg, rgba(255,215,120,.35), transparent 22%),
      linear-gradient(145deg,#062f2f,#081827 45%,#0b3b36);
    border:1px solid rgba(255,215,120,.65);
    box-shadow:
      0 25px 50px rgba(0,0,0,.55),
      inset 0 1px 1px rgba(255,255,255,.45),
      inset 0 -1px 1px rgba(255,215,120,.25);
    position:relative;
    overflow:hidden;
}
    
.id-card::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    background:rgba(34,197,94,.18);
    border-radius:50%;
    right:-70px;
    bottom:-70px;
}

.id-card::after{
    content:"";
    position:absolute;
    width:100%;
    height:45px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
    top:0;
    left:-100%;
    animation:shine 4s infinite;
}

@keyframes shine{
    0%{left:-100%}
    60%{left:120%}
    100%{left:120%}
}

.id-card h3{
    margin:0 0 10px;
    font-size:18px;
}

.id-card img{
    width:75px;
    height:75px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    background:#fff;
}

.id-card .name{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.id-card .info{
    font-size:13px;
    margin-top:5px;
}

.card-status{
    display:inline-block;
    margin-top:10px;
    padding:6px 14px;
    border-radius:20px;
    background:#22c55e;
    font-size:12px;
    font-weight:bold;
}

.download-card-btn{
    margin-top:18px;
    background:#0ea5e9;
}
    .card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}

.brand{
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
    color:#ffd700;
}

.card-type{
    font-size:11px;
    color:#ffffffcc;
    border:1px solid rgba(255,255,255,.3);
    padding:4px 10px;
    border-radius:20px;
}

.card-middle{
    display:flex;
    align-items:center;
    gap:16px;
    margin:18px 0;
}

.card-details{
    flex:1;
    text-align:left;
}

.signature{
    color:#ffd700;
    font-size:16px;
    font-style:italic;
    font-weight:bold;
}

.card-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Profile Picture</h2>

<div class="container">

    <img id="profilePreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

    <br><br>

    <input type="file" id="photoInput" accept="image/*">

    <br><br>

    <button id="uploadBtn">Upload Photo</button>

    <br><br>

    <button onclick="location.href='dashboard.html'">Back</button>

    <div class="id-card-section">

        <div class="id-card" id="dreamCard">

    <div class="card-top">
        <div class="brand">DREAMCASH</div>
        <div class="card-type">IDENTITY CARD</div>
    </div>

    <div class="card-middle">
        <img id="cardPhoto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

        <div class="card-details">
            <div class="name" id="cardName">Loading...</div>
            <div class="info">Member ID: <span id="cardUserId">Loading...</span></div>
            <div class="info">Status: <span id="cardStatusText">Loading...</span></div>
        </div>
    </div>

    <div class="card-bottom">
        <span class="card-status" id="cardStatus">Active</span>
        <span class="signature">DreamCash</span>
    </div>

        </div>

        <button class="download-card-btn" id="downloadCardBtn">
            Download ID Card
        </button>

    </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("profilePreview");
const cardPhoto = document.getElementById("cardPhoto");
const cardName = document.getElementById("cardName");
const cardUserId = document.getElementById("cardUserId");

const savedPhoto = localStorage.getItem("profilePhoto");
if (savedPhoto) {
    preview.src = savedPhoto;
    cardPhoto.src = savedPhoto;
}

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(currentUser){

    cardName.innerText = currentUser.name;

    cardUserId.innerText = currentUser.member_id;

    // Status
    document.getElementById("cardStatus").innerText =
        currentUser.status;
    document.getElementById("cardStatusText").innerText =
currentUser.status;

    // Status color
    if(currentUser.status === "Active"){
        document.getElementById("cardStatus").style.background = "#22c55e";
    }else{
        document.getElementById("cardStatus").style.background = "#ef4444";
    }

}

photoInput.addEventListener("change", function () {
    const file = photoInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        preview.src = e.target.result;
        cardPhoto.src = e.target.result;
    };

    reader.readAsDataURL(file);
});

document.getElementById("uploadBtn").addEventListener("click", async function () {
    const file = photoInput.files[0];

    if (!file) {
        alert("Please choose a photo first");
        return;
    }

    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabaseClient.storage
        .from("avatars")
        .upload(fileName, file);

    if (error) {
        alert(error.message);
        return;
    }

    const imageUrl = SUPABASE_URL + "/storage/v1/object/public/avatars/" + fileName;

    localStorage.setItem("profilePhoto", imageUrl);
    preview.src = imageUrl;
    cardPhoto.src = imageUrl;

    alert("Photo uploaded successfully!");
});

document.getElementById("downloadCardBtn").addEventListener("click", async function () {

    const card = document.getElementById("dreamCard");

    const canvas = await html2canvas(card, {
        scale: 4,
        useCORS: true,
        backgroundColor: null
    });

    // 1280 × 720 HD Canvas
    const finalCanvas = document.createElement("canvas");
    finalCanvas.width = 1280;
    finalCanvas.height = 720;

    const ctx = finalCanvas.getContext("2d");

    // Background
    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0, 0, 1280, 720);

    // Card ko center me draw karo
    const cardWidth = 1000;
    const cardHeight = cardWidth * canvas.height / canvas.width;

    const x = (1280 - cardWidth) / 2;
    const y = (720 - cardHeight) / 2;

    ctx.drawImage(canvas, x, y, cardWidth, cardHeight);

    const link = document.createElement("a");
    link.download = "DreamCash-ID-Card.png";
    link.href = finalCanvas.toDataURL("image/png");
    link.click();

});
</script>

</body>
</html>
