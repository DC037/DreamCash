<!DOCTYPE html>
<html>
<head>
<title>DreamCash Rank Records</title>

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<style>

body{
margin:0;
padding:15px;
background:#eef3f7;
font-family:Arial;
}

.card{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 10px #0001;
}

h2{
color:#0b6b7a;
}

.row{
border-bottom:1px solid #eee;
padding:12px 0;
}

.btn{
border:none;
padding:10px 18px;
border-radius:20px;
font-size:14px;
font-weight:bold;
color:#fff;
cursor:pointer;
margin-right:8px;
}

.green{
background:#16c784;
}

.red{
background:#e74c3c;
}

.status{
font-weight:bold;
}

.status.Pending{
color:#f59e0b;
}

.status.Approved{
color:#16a34a;
}

.status.Rejected{
color:#dc2626;
}

button,
.btn{
border:none!important;
border-radius:20px!important;
padding:10px 20px!important;
font-weight:900!important;
color:#fff!important;
cursor:pointer!important;
position:relative!important;
overflow:hidden!important;

box-shadow:
inset 0 2px 4px rgba(255,255,255,.55),
inset 0 -5px 9px rgba(0,0,0,.22),
0 5px 0 rgba(0,0,0,.18),
0 9px 15px rgba(0,0,0,.18)!important;

transition:.15s ease!important;
}

button::before,
.btn::before{

content:"";

position:absolute;

top:-55%;

left:-35%;

width:90%;

height:100%;

background:
linear-gradient(
135deg,
rgba(255,255,255,.65),
rgba(255,255,255,.05)
);

transform:rotate(25deg);

pointer-events:none;

}

button:active,
.btn:active{

transform:
translateY(4px)
scale(.98)!important;

box-shadow:

inset 0 2px 4px
rgba(255,255,255,.45),

0 2px 0
rgba(0,0,0,.20)!important;

}

</style>

</head>

<body>

<h2>
🏆 DreamCash Rank Records
</h2>

<div class="card">

<h3>
🏆 Rank Reward Claims
</h3>

<div id="rankRewardClaimsList">

Loading...

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY =
"sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
async function loadRankRewardClaims(){

const box =
document.getElementById(
"rankRewardClaimsList"
);

box.innerHTML="Loading...";

const {data,error} =
await supabaseClient

.from("rank_reward_claims")

.select("*")

.order(
"created_at",
{ascending:false}
);

if(error){

box.innerHTML=
"<span style='color:red'>"
+
error.message+
"</span>";

return;

}

if(!data || data.length===0){

box.innerHTML=
"No Rank Reward Claims Found";

return;

}

let html="";

for(const item of data){

const {

data:user

}=await supabaseClient

.from("users")

.select(
"full_name,name,username,mobile,phone,number"
)

.eq(
"member_id",
item.member_id
)

.single();

const userName=

user?.full_name||

user?.name||

user?.username||

"N/A";

const mobile=

user?.mobile||

user?.phone||

user?.number||

"N/A";

html+=`

<div class="row">

<b>Name :</b>
${userName}
<br>

<b>Member ID :</b>
${item.member_id}
<br>

<b>Mobile :</b>
${mobile}
<br>

<b>Rank :</b>
${item.rank_name}
<br>

<b>Reward :</b>
${item.reward_dc} DC
<br>

<b>Status :</b>

<span class="status ${item.status}">

${item.status}

</span>

<br><br>

<button

class="btn green"

onclick="approveRankReward(${item.id})">

Approve

</button>

<button

class="btn red"

onclick="rejectRankReward(${item.id})">

Reject

</button>

</div>

`;

}

box.innerHTML=html;

}
  async function approveRankReward(id){

if(!confirm("Approve this Rank Reward?")) return;

const {data:claim,error:claimError}=await supabaseClient

.from("rank_reward_claims")

.select("*")

.eq("id",id)

.single();

if(claimError||!claim){

alert("Claim not found");

return;

}

if(claim.status==="Approved"){

alert("Already Approved");

return;

}

const {data:user,error:userError}=await supabaseClient

.from("users")

.select("wallet,current_rank")

.eq("member_id",claim.member_id)

.single();

if(userError||!user){

alert("User not found");

return;

}

const newWallet=

Number(user.wallet||0)+

Number(claim.reward_dc||0);

const {error:updateUserError}=await supabaseClient

.from("users")

.update({

wallet:newWallet,

current_rank:claim.rank_name

})

.eq(

"member_id",

claim.member_id

);

if(updateUserError){

alert(updateUserError.message);

return;

}

const {error:updateClaimError}=await supabaseClient

.from("rank_reward_claims")

.update({

status:"Approved"

})

.eq("id",id);

if(updateClaimError){

alert(updateClaimError.message);

return;

}

alert("Rank Reward Approved Successfully");

loadRankRewardClaims();

  }
  async function rejectRankReward(id){

if(!confirm("Reject this Rank Reward?")) return;

const {error}=await supabaseClient

.from("rank_reward_claims")

.update({

status:"Rejected"

})

.eq("id",id);

if(error){

alert(error.message);

return;

}

alert("Rank Reward Rejected");

loadRankRewardClaims();

}

loadRankRewardClaims();

</script>

</body>

</html>
