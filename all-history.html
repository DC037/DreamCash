<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All History - DreamCash</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5ff;
padding:15px;
}

.header{
background:linear-gradient(90deg,#0d6efd,#00b7ff);
color:#fff;
padding:18px;
border-radius:15px;
text-align:center;
font-size:26px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.25);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
justify-items:center;
}

.history-btn{
width:145px;
height:145px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
font-size:18px;
color:#fff;
text-decoration:none;
box-shadow:
0 10px 20px rgba(0,0,0,.30),
inset 0 8px 15px rgba(255,255,255,.40),
inset 0 -10px 18px rgba(0,0,0,.18);
transition:.25s;
padding:18px;
line-height:1.35;
}

.history-btn:active{
transform:scale(.95);
}

.offer{
background:linear-gradient(#ff9800,#ff6f00);
}

.refer{
background:linear-gradient(#2196f3,#1565c0);
}

.spin{
background:linear-gradient(#9c27b0,#6a1b9a);
}

.scratch{
background:linear-gradient(#2ecc71,#0b8d4b);
}

.checkin{
background:linear-gradient(#ff4fa3,#d81b60);
}

.rank{
background:linear-gradient(#ffc107,#ff9800);
}

.monthly{
background:linear-gradient(#00bcd4,#0097a7);
}

.withdraw{
background:linear-gradient(#f44336,#b71c1c);
}

</style>

</head>

<body>

<div class="header">
📜 All History
</div>

<div class="grid">

<a href="#" class="history-btn offer">
Offer<br>History
</a>

<a href="#"
class="history-btn refer"
onclick="loadReferralHistory();return false;">
Referral<br>History
</a>

<a href="#" class="history-btn spin">
Spin<br>History
</a>

<a href="#" class="history-btn scratch">
Scratch<br>History
</a>

<a href="#" class="history-btn checkin">
Check-in<br>History
</a>

<a href="#" class="history-btn rank">
Rank Reward<br>History
</a>

<a href="#" class="history-btn monthly">
Monthly Reward<br>History
</a>

<a href="#" class="history-btn withdraw">
Withdrawal<br>History
</a>

</div>
<div id="referHistorySection" style="display:none;margin-top:25px;">

<div style="
background:linear-gradient(135deg,#2196f3,#1565c0);
color:white;
padding:15px;
border-radius:15px;
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:15px;">
🤝 Referral History
</div>

<div id="referHistoryList"></div>

</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);
</script>
  <script>

async function loadReferralHistory(){

document.getElementById("referHistorySection").style.display="block";

document.getElementById("referHistorySection").scrollIntoView({
behavior:"smooth"
});

const list = document.getElementById("referHistoryList");

list.innerHTML = "Loading...";

const userId =
localStorage.getItem("member_id") ||
localStorage.getItem("last_member_id");

const { data, error } = await supabaseClient
.from("income_history")
.select("*")
.eq("user_id", userId)
.order("created_at", { ascending:false });

if(error){

list.innerHTML = "History Load Failed";

return;

}

console.log(data);

}

  </script>
</body>
</html>
