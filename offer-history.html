<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamCash - Offer History</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

.header{
    background:#16a34a;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.history-card{
    background:#fff;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.offer-name{
    font-size:18px;
    font-weight:bold;
}

.offer-status{
    color:green;
    margin-top:5px;
}

.offer-reward{
    margin-top:5px;
    font-weight:bold;
}

.back-btn{
    display:block;
    text-align:center;
    text-decoration:none;
    background:#111827;
    color:#fff;
    padding:12px;
    border-radius:8px;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="header">
Offer History
</div>

<div class="container">

    <div class="history-card">
        <div class="offer-name">No Offer History Found</div>
        <div class="offer-status">Complete offers to see history here</div>
    </div>

    <a href="dashboard.html" class="back-btn">
        Back To Dashboard
    </a>

</div>

</body>
</html>
