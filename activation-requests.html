<!DOCTYPE html>

<style>
body{

background:#eef3f7;
margin:0;
padding:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 10px #0001;
}
  
.row{
background:#fff;
padding:15px;
margin-bottom:15px;

box-shadow:0 4px 12px rgba(0,0,0,.08);
border-left:5px solid #0b6b7a;

.row:hover{

transition:.2s;

}
h2{
color:#0b6b7a;
}

.btn{
border:none !important;
border-radius:20px !important;
padding:10px 20px !important;
font-weight:900 !important;
color:white !important;
cursor:pointer !important;
position:relative;
overflow:hidden;
box-shadow:
inset 0 2px 4px rgba(255,255,255,.55),
inset 0 -5px 9px rgba(0,0,0,.22),
0 5px 0 rgba(0,0,0,.18),
0 9px 15px rgba(0,0,0,.18);
transition:.15s ease;
}

.btn::before{
content:"";
position:absolute;
top:-55%;
left:-35%;
width:90%;
height:100%;
background:linear-gradient(135deg,rgba(255,255,255,.65),rgba(255,255,255,.05));
transform:rotate(25deg);
pointer-events:none;
}

.btn:active{
transform:translateY(4px) scale(.98);
box-shadow:
inset 0 2px 4px rgba(255,255,255,.45),
0 2px 0 rgba(0,0,0,.20);
}

.green{
background:linear-gradient(135deg,#00c853,#32e67a);
}

.red{
background:linear-gradient(135deg,#ff3d3d,#ff6b6b);
}

.status.approved{
color:green;
font-weight:bold;
}

.status.rejected{
color:red;
font-weight:bold;
}

.status.pending{
color:#e67e22;
font-weight:bold;
}

</head>

<body>

<script>

async function loadActivationRequests(){

const box = document.getElementById("activationList");

box.innerHTML = "Loading...";

const { data, error } = await supabaseClient
.from("activation_requests")
.select("*")
.order("created_at",{ascending:false});

if(error){
box.innerHTML = error.message;
return;
}

if(!data || data.length===0){
box.innerHTML = "No activation requests found.";
return;
}

let html = "";

for (const d of data) {
  let cardColor =
d.status==="Approved"
? "#eafaf1"
: d.status==="Rejected"
? "#fdecec"
: "#fff8e6";

let borderColor =
d.status==="Approved"
? "#28a745"
: d.status==="Rejected"
? "#dc3545"
: "#f4b400";
const dateTime = new Date(d.created_at);

const requestDate = dateTime.toLocaleDateString("en-IN",{
day:"2-digit",
month:"short",
year:"numeric"
});

const requestTime = dateTime.toLocaleTimeString("en-IN",{
hour:"2-digit",
minute:"2-digit",
hour12:true
});
html += `
<div class="row" style="background:${cardColor};border-left:6px solid ${borderColor};">

<b>Amount:</b> ₹${d.amount}<br>

<b>Transaction ID:</b> ${d.transaction_id}<br>

<b>Name:</b>
${d.full_name || d.fullName || d.userName || d.name || d.username || d.displayName || "N/A"}
<br>

<b>User ID:</b> ${d.user_id}<br>
<b>Date:</b> ${requestDate}<br>

<b>Time:</b> ${requestTime}<br>
<b>Status:</b>

<span class="status ${
d.status==="Approved"
?"approved"
:d.status==="Rejected"
?"rejected"
:"pending"
}">

${d.status==="Approved"
?"✅"
:d.status==="Rejected"
?"❌"
:"⏳"}

${d.status}

</span>

<br><br>

<button
class="btn green"
onclick="approveActivation('${d.id}','${d.user_id}')">

Activate

</button>

<button
class="btn red"
onclick="rejectActivation('${d.id}','${d.user_id}')">

Reject

</button>

</div>
`;

});

box.innerHTML = html;

}
  async function approveActivation(id,userId){

if(!confirm("Approve this activation request?")) return;

let finalUserId = userId;

if(userId.includes("ref=")){
finalUserId = userId.split("ref=")[1].split("&")[0];
}

const { error:userError } = await supabaseClient
.from("users")
.update({
status:"Active"
})
.eq("member_id",finalUserId);

if(userError){
alert(userError.message);
return;
}

await distributeLevelIncome(finalUserId);

const { error } = await supabaseClient
.from("activation_requests")
.update({
status:"Approved"
})
.eq("id",id);

if(error){
alert(error.message);
return;
}

alert("Activation Complete Successfully");

loadActivationRequests();

  }
async function distributeLevelIncome(userId){

const levelAmounts = [25,10,5,5,5];

let currentMemberId = userId;

for(let level=1; level<=5; level++){

const { data:currentUser } = await supabaseClient
.from("users")
.select("sponsor_id")
.eq("member_id",currentMemberId)
.single();

if(!currentUser || !currentUser.sponsor_id) break;

const sponsorId = currentUser.sponsor_id;

const income = levelAmounts[level-1];

const { data:sponsorUser } = await supabaseClient
.from("users")
.select("wallet,lifetime_earning")
.eq("member_id",sponsorId)
.single();

if(!sponsorUser) break;

await supabaseClient
.from("income_history")
.insert({
user_id:sponsorId,
from_user_id:userId,
level:level,
amount:income,
income_type:"level_income",
status:"approved"
});

const oldWallet = Number(sponsorUser.wallet || 0);

const oldLifetime = Number(sponsorUser.lifetime_earning || 0);

await supabaseClient
.from("users")
.update({
wallet:oldWallet + income,
lifetime_earning:oldLifetime + income
})
.eq("member_id",sponsorId);

currentMemberId = sponsorId;

}

  }
async function rejectActivation(id,userId){

if(!confirm("Reject this activation request?")) return;

let finalUserId = userId || "";

if(finalUserId.includes("ref=")){
finalUserId = finalUserId.split("ref=")[1].split("&")[0];
}

const { error:reqError } = await supabaseClient
.from("activation_requests")
.update({
status:"Rejected"
})
.eq("id",id);

if(reqError){
alert("Reject error: " + reqError.message);
return;
}

const { error:userError } = await supabaseClient
.from("users")
.update({
status:"Rejected"
})
.eq("member_id",finalUserId);

if(userError){
alert("User status error: " + userError.message);
return;
}

alert("Activation Rejected Successfully");

loadActivationRequests();

}
loadActivationRequests();

</script>
