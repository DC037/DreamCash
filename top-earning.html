<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Earning</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
}
.header{
  padding:18px;
  text-align:center;
  background:#111827;
  font-size:24px;
  font-weight:bold;
}
.back{
  margin:15px;
}
.back button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}
.card{
  margin:15px;
  padding:15px;
  border-radius:16px;
  background:#1e293b;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.rank{
  font-size:22px;
  font-weight:bold;
  color:#facc15;
}
.name{
  font-size:18px;
  margin-top:5px;
}
.amount{
  color:#22c55e;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>
<body>

<div class="header">🏆 Top Earning</div>

<div class="back">
  <button onclick="window.location.href='dashboard.html'">⬅ Back</button>
</div>

<div id="earningList">
  <div class="card">
    <div>
      <div class="rank">#1</div>
      <div class="name">Loading...</div>
    </div>
    <div class="amount">₹0</div>
  </div>
</div>

</body>
</html>
