<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Earning</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
}

.header{
background:#111827;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.backBtn{
margin:15px;
padding:10px 18px;
background:#22c55e;
color:#fff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.rankCard{
background:#1e293b;
margin:12px;
padding:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{
display:flex;
flex-direction:column;
gap:4px;
}

.rank{
font-size:22px;
font-weight:bold;
color:#facc15;
}

.name{
font-size:18px;
font-weight:bold;
}

.member{
font-size:13px;
color:#cbd5e1;
}

.team{
font-size:13px;
color:#94a3b8;
}

.right{
text-align:right;
}

.earning{
font-size:20px;
font-weight:bold;
color:#22c55e;
}
</style>
</head>

<body>

<div class="header">🏆 Top Earning</div>

<button class="backBtn"
onclick="window.location.href='dashboard.html'">
← Back
</button>

<div id="leaderboard"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://baqiuuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY =
"sb_publishable_M-R7UOrWf2JPMefVzPAQRw_mjTphJ_1";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function loadLeaderboard(){

const { data , error } = await supabaseClient
.from("users")
.select(`
name,
member_id,
referral_count,
referral_income
`)
.order("referral_income",{ascending:false})
.limit(15);

if(error){
console.log(error);
return;
}

let html = "";

data.forEach((user,index)=>{

html += `
<div class="rankCard">

<div class="left">

<div class="rank">
#${index+1}
</div>

<div class="name">
${user.name || "User"}
</div>

<div class="member">
ID : ${user.member_id || "-"}
</div>

<div class="team">
Total Team :
${user.referral_count || 0}
</div>

</div>

<div class="right">

<div class="earning">
₹${Number(
user.referral_income || 0
).toFixed(2)}
</div>

<div>Total Earning</div>

</div>

</div>
`;

});

document.getElementById("leaderboard").innerHTML =
html;

}

loadLeaderboard();

</script>

</body>
</html>
