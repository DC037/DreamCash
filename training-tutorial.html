<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Tutorials</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#0d6efd;
color:#fff;
padding:15px;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.backBtn{
background:#fff;
color:#0d6efd;
border:none;
padding:8px 15px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.header h2{
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:#fff;
border-radius:12px;
padding:18px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card h3{
font-size:18px;
margin-bottom:15px;
color:#222;
}
    .thumb{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
display:block;
    }

.watchBtn{
width:100%;
padding:12px;
border:none;
background:#ff0000;
color:#fff;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.watchBtn:hover{
opacity:.9;
}

.message{
text-align:center;
padding:40px;
font-size:18px;
color:#666;
}
</style>

</head>
<body>

<div class="header">
<button class="backBtn" onclick="history.back()">← Back</button>
<h2>Training Tutorials</h2>
</div>

<div class="container" id="tutorialList">
<div class="message">Loading...</div>
</div>

<script>

const SUPABASE_URL="https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY="sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabase=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

loadTutorials();
console.log(window.supabase);
console.log(supabase);
async function loadTutorials(){

const list=document.getElementById("tutorialList");

const {data,error}=await supabase
    console.log(data);
console.log(error);
.from("training_tutorials")
.select("*")
.eq("is_active",true)
.order("display_order",{ascending:true});

if(error){

console.log(error);

list.innerHTML=`<div class="message">${error.message}</div>`;

return;

}

if(!data || data.length===0){

list.innerHTML='<div class="message">No Training Videos Available.</div>';
return;

}

list.innerHTML="";

data.forEach(video=>{

let videoId="";

try{

const url=new URL(video.youtube_url);

if(url.hostname.includes("youtu.be")){
videoId=url.pathname.substring(1);
}else{
videoId=url.searchParams.get("v");
}

}catch(e){}

const thumbnail=videoId
?`https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
:"";

list.innerHTML+=`

<div class="card">

<img class="thumb" src="${thumbnail}" alt="Thumbnail">

<h3>${video.title}</h3>

<button class="watchBtn"
onclick="window.open('${video.youtube_url}','_blank')">
▶ Watch Video
</button>

</div>

`;

});
}

</script>

</body>
</html>
