<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Training Tutorial - DreamCash</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f7fb;
padding:15px;
color:#222;
}

.header{
background:linear-gradient(135deg,#ff9800,#ffb300);
color:white;
padding:18px;
border-radius:18px;
text-align:center;
margin-bottom:18px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.backBtn{
display:inline-block;
margin-bottom:12px;
background:#1976d2;
color:white;
padding:10px 18px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.card{
background:white;
border-radius:18px;
padding:14px;
margin-bottom:18px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.thumb{
width:100%;
height:190px;
object-fit:cover;
border-radius:14px;
display:block;
}

.title{
font-size:18px;
font-weight:bold;
text-align:center;
margin:12px 0;
}

.watchBtn{
display:block;
width:100%;
text-align:center;
background:linear-gradient(135deg,#ff0000,#ff4d4d);
color:white;
padding:14px;
border-radius:14px;
text-decoration:none;
font-size:17px;
font-weight:bold;
}
</style>
</head>

<body>

<a href="dashboard.html" class="backBtn">
⬅ Back
</a>

<div class="header">
<h2>🎥 DreamCash Training Tutorials</h2>
</div>
<div id="tutorialList"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

</script>
<script>

loadTutorials();

async function loadTutorials() {

const { data, error } = await supabaseClient
.from("training_tutorials")
.select("*")
.eq("is_active", true)
.order("display_order", { ascending: true });

if (error) {
console.log(error);
return;
}

let html = "";

data.forEach(item => {

let videoId = "";

const match = item.youtube_url.match(
/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/shorts\/)([^?&/]+)/
);

if (match) {
    videoId = match[1];
}

const thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

html += `

<div class="card">

<a href="${item.youtube_url}" target="_blank">

<img class="thumb" src="${thumb}">

</a>

<div class="title">

${item.title}

</div>

<a class="watchBtn"
href="${item.youtube_url}"
target="_blank">

▶ Watch on YouTube

</a>

</div>

`;

});

document.getElementById("tutorialList").innerHTML = html;

}

</script>

</body>
</html>
