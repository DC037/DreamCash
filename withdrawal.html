<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Requests</title>

    <link rel="stylesheet" href="../css/admin.css">
    <style>
body{margin:0;background:#eef3f8;font-family:Arial,sans-serif}
.header{background:#e9f0f6;padding:18px;font-size:22px;font-weight:bold;color:#0b6d77}
.container{width:95%;margin:20px auto}
.card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
        .withdraw-card{
    background:#f9fbfc;
    border:1px solid #dfe8ef;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    line-height:1.8;
    box-shadow:0 2px 6px rgba(0,0,0,.05);
        }

.row b{
color:#222;
}

.btn{
border:none;
padding:10px 18px;
border-radius:25px;
font-weight:bold;
cursor:pointer;
margin-right:8px;
color:#fff;
}

.green{
background:linear-gradient(to bottom,#4dff88,#00b74a);
box-shadow:0 4px 10px rgba(0,180,74,.4);
}

.red{
background:linear-gradient(to bottom,#ff7070,#d60000);
box-shadow:0 4px 10px rgba(214,0,0,.4);
}
        .approved-card{
    background:#eaffef !important;
    border-left:8px solid #16a34a;
}

.rejected-card{
    background:#fff1f1 !important;
    border-left:8px solid #dc2626;
}
        .summary-bar{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin:18px 0;
}

.summary-box{
padding:18px;
border-radius:18px;
color:#fff;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.summary-box .num{
font-size:24px;
font-weight:700;
margin-bottom:6px;
}

.summary-box .text{
font-size:13px;
opacity:.95;
}

.pending{
background:linear-gradient(135deg,#ff9800,#ff5722);
}

.approved{
background:linear-gradient(135deg,#00c853,#00e676);
}

.rejected{
background:linear-gradient(135deg,#e53935,#ff5252);
}

.total{
background:linear-gradient(135deg,#1976d2,#42a5f5);
}
    </style>
</head>
<body>
    
<div class="header">
DreamCash Admin Panel
</div>

<div class="container">

<div class="card">
<h3>💸 Withdrawal Requests</h3>
    <div class="summary-bar">

    <div class="summary-box pending">
        <div class="num" id="pendingCount">0</div>
        <div class="text">Pending</div>
    </div>

    <div class="summary-box approved">
        <div class="num" id="approvedCount">0</div>
        <div class="text">Approved</div>
    </div>

    <div class="summary-box rejected">
        <div class="num" id="rejectedCount">0</div>
        <div class="text">Rejected</div>
    </div>

    <div class="summary-box total">
        <div class="num" id="totalAmount">₹0</div>
        <div class="text">Total Amount</div>
    </div>

    </div>

<div id="withdrawalList">
Loading...
</div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);
    async function loadWithdrawals() {

  const box = document.getElementById("withdrawalList");
  box.innerHTML = "Loading...";

  const { data, error } = await supabaseClient
    .from("withdrawal_requests")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    box.innerHTML = error.message;
    return;
  }

  if (!data || data.length === 0) {
    box.innerHTML = "No withdrawal requests found.";
    return;
  }

  let html = "";
let pending=0;
let approved=0;
let rejected=0;
let totalAmount=0;
  data.forEach(d => {
totalAmount += Number(d.amount||0);

if(d.status=="Pending") pending++;
if(d.status=="Approved") approved++;
if(d.status=="Rejected") rejected++;
    html += `
      <div class="withdraw-card ${d.status==='Approved'?'approved-card':'rejected-card'}">
        <b>Amount:</b> ₹${d.amount}<br>
        <b>UPI:</b> ${d.upi}<br>
        <b>Name:</b> ${d.name || "N/A"}<br>
        <b>Member ID:</b> ${d.member_id || "N/A"}<br>
        <b>User ID:</b> ${d.user_id || "N/A"}<br>
 🕒 <b>Requested:</b> ${new Date(d.created_at).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}<br>
        <b>Status:</b>

        <span class="status ${d.status === "Approved" ? "approved" : d.status === "Rejected" ? "rejected" : "pending"}">

        ${d.status === "Approved" ? "✅" : d.status === "Rejected" ? "❌" : "⏳"} ${d.status}

        </span>

        <button class="btn green"
        onclick="approveWithdraw('${d.id}')">
        Approve
        </button>

        <button class="btn red"
        onclick="rejectWithdraw('${d.id}')">
        Reject
        </button>

      </div>
<div style="clear:both;"></div>

    `;

  });
document.getElementById("pendingCount").innerText=pending;
document.getElementById("approvedCount").innerText=approved;
document.getElementById("rejectedCount").innerText=rejected;
document.getElementById("totalAmount").innerText="₹"+totalAmount;
  box.innerHTML = html;
    }
    async function approveWithdraw(id){

  const { error } = await supabaseClient
    .from("withdrawal_requests")
    .update({ status: "Approved" })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  alert("Withdrawal Approved");
  loadWithdrawals();
}

async function rejectWithdraw(id){

  const { data: reqData, error: statusError } = await supabaseClient
    .from("withdrawal_requests")
    .update({
      status: "Rejected",
      refunded: true
    })
    .eq("id", id)
    .eq("status", "Pending")
    .eq("refunded", false)
    .select()
    .single();

  if(statusError || !reqData){
    alert("Ye request already processed hai");
    loadWithdrawals();
    return;
  }

  const { data: userData, error: userError } = await supabaseClient
    .from("users")
    .select("wallet")
    .eq("member_id", reqData.member_id)
    .single();

  if(userError || !userData){
    alert("User wallet fetch error");
    return;
  }

  const newWallet = Number(userData.wallet || 0) + Number(reqData.amount || 0);

  const { error: walletError } = await supabaseClient
    .from("users")
    .update({ wallet: newWallet })
    .eq("member_id", reqData.member_id);

  if(walletError){
    alert("Refund error: " + walletError.message);
    return;
  }

  alert("Withdrawal Rejected & Balance Refunded");
  loadWithdrawals();
}

loadWithdrawals();
</script>
</body>
</html>
