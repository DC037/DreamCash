<!DOCTYPE html>
<html>
<head>
<title>DreamCash Offer Activation</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#eef3f7;
margin:0;
padding:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 10px #0001;
}

h2{
color:#0b6b7a;
}

.row{
border-bottom:1px solid #eee;
padding:10px 0;
}
/* ===== 3D Glossy Galaxy Buttons ===== */

.btn{
border:none;
padding:10px 22px;
border-radius:25px;
color:#fff;
font-weight:900;
font-size:14px;
cursor:pointer;
position:relative;
overflow:hidden;
margin-right:8px;
margin-bottom:8px;
transition:.18s ease;
box-shadow:
inset 0 2px 4px rgba(255,255,255,.55),
inset 0 -5px 10px rgba(0,0,0,.25),
0 5px 0 rgba(0,0,0,.20),
0 10px 18px rgba(0,0,0,.18);
}

.btn::before{
content:"";
position:absolute;
top:-60%;
left:-30%;
width:80%;
height:180%;
background:linear-gradient(
135deg,
rgba(255,255,255,.70),
rgba(255,255,255,0)
);
transform:rotate(25deg);
pointer-events:none;
}

.btn:hover{
transform:translateY(-2px);
}

.btn:active{
transform:translateY(4px) scale(.98);
box-shadow:
inset 0 2px 4px rgba(255,255,255,.35),
0 2px 0 rgba(0,0,0,.20);
}

/* Approve Button */
.green{
background:linear-gradient(135deg,#00b75a,#22e58b);
}

/* Reject Button */
.red{
background:linear-gradient(135deg,#ff3030,#ff6b6b);
}

/* Back Button */
.blue{
background:linear-gradient(135deg,#005bea,#29b6ff);
}

/* Optional Purple Button */
.purple{
background:linear-gradient(135deg,#6a11cb,#a855f7);
}

/* Optional Orange Button */
.orange{
background:linear-gradient(135deg,#ff7a00,#ffb300);
}

.status{
font-weight:bold;
}

.status.approved{
color:green;
}

.status.rejected{
color:red;
}

.status.pending{
color:#e67e22;
}
.status{
display:inline-block;
padding:6px 14px;
border-radius:30px;
font-size:13px;
font-weight:700;
border:1px solid transparent;
}

/* Approved */
.status.approved{
background:#dcfce7;
color:#15803d;
border-color:#86efac;
}

/* Pending */
.status.pending{
background:#fef9c3;
color:#a16207;
border-color:#fde047;
}

/* Rejected */
.status.rejected{
background:#fee2e2;
color:#b91c1c;
border-color:#fca5a5;
}
</style>

</head>

<body>
<button class="btn blue"
onclick="window.location.href='admin.html'">
⬅ Back to Admin
</button>
<h2>📸 Offer Requests</h2>

<div class="card">

<div id="offerList">
Loading...
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
async function loadOfferRequests(){

const box=document.getElementById("offerList");

box.innerHTML="Loading...";

const response=await fetch(

SUPABASE_URL+"/rest/v1/offer_submissions?select=id,user_id,offer_id,reward,status,screenshot_url,created_at&order=created_at.desc&limit=50",

{

headers:{

"apikey":SUPABASE_KEY,

"Authorization":"Bearer "+SUPABASE_KEY

}

}

);

const data=await response.json();

const error=null;

if(error){

box.innerHTML=error.message;

return;

}

if(!data||data.length===0){

box.innerHTML="No offer requests found.";

return;

}

let html="";

for(const d of data){

const {data:userData}=await supabaseClient

.from("users")

.select("full_name,name,username,sponsor_id")

.eq("member_id",d.user_id)

.single();

let applyName=

userData?.full_name||

userData?.name||

userData?.username||

"N/A";

let sponsorName="N/A";

if(userData?.sponsor_id){

const {data:sponsorData}=await supabaseClient

.from("users")

.select("full_name,name,username")

.eq("member_id",userData.sponsor_id)

.single();

sponsorName=

sponsorData?.full_name||

sponsorData?.name||

sponsorData?.username||

"N/A";

}

html+=`

<div class="row">

<b>User ID:</b> ${d.user_id}<br>

<b>Apply Name:</b> ${applyName}<br>

<b>Sponsor:</b> ${sponsorName}<br>

<b>Offer ID:</b> ${d.offer_id}<br>

<b>Reward:</b> ${d.reward}<br>
<b>Status:</b>
<span class="status ${d.status==='Approved'?'approved':d.status==='Rejected'?'rejected':'pending'}">
${d.status}
</span><br>

<a href="${d.screenshot_url}" target="_blank">

View Screenshot

</a>

<br><br>

<button class="btn green"

onclick="approveOffer('${d.id}','${d.user_id}',${d.reward})">

Approve

</button>

<button class="btn red"

onclick="rejectOffer('${d.id}','${d.user_id}')">

Reject

</button>

<hr>

</div>

`;

}

box.innerHTML=html;

}
async function approveOffer(submissionId,userId,reward){

if(!confirm("Approve this offer request?")) return;

const {data:oldReq,error:oldReqError}=await supabaseClient
.from("offer_history")
.select("status")
.eq("id",submissionId)
.maybeSingle();

if(oldReqError){
alert("Request check error: "+oldReqError.message);
return;
}

if(oldReq && oldReq.status==="Approved"){
alert("Ye offer pehle se Approved hai. Wallet me dobara point add nahi honge.");
return;
}

const LEVEL_PERCENTAGES = [100,10,5,3,2];

async function creditUser(memberId, amount, isReferral=false){

if(!memberId || amount<=0) return;

const {data:user}=await supabaseClient
.from("users")
.select("wallet,lifetime_earning,referral_income")
.eq("member_id",memberId)
.maybeSingle();

if(!user) return;

const updateData={
wallet:Number(user.wallet||0)+amount,
lifetime_earning:Number(user.lifetime_earning||0)+amount,
};

if(isReferral){
updateData.referral_income=
Number(user.referral_income||0)+amount;
}

await supabaseClient
.from("users")
.update(updateData)
.eq("member_id",memberId);

}

const res=await fetch(

SUPABASE_URL+
"/rest/v1/offer_submissions?id=eq."+submissionId,

{
method:"PATCH",

headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json",
"Prefer":"return=representation"
},

body:JSON.stringify({
status:"Approved"
})

}

);

const result=await res.text();

if(!res.ok){
alert("Approve Error: "+result);
return;
}
const { data: submission } = await supabaseClient
.from("offer_submissions")
.select("offer_id")
.eq("id", submissionId)
.single();
const rewardAmount = Number(reward || 0);

// User ko 100%
await creditUser(userId, rewardAmount, false);

// Level 1 → Level 4 Distribution

let currentMemberId = userId;

for (let level = 1; level <= 4; level++) {

    const {
        data: currentUser,
        error: sponsorError
    } = await supabaseClient
        .from("users")
        .select("sponsor_id")
        .eq("member_id", currentMemberId)
        .maybeSingle();

    if (sponsorError) {
        console.error(sponsorError);
        break;
    }

    if (!currentUser || !currentUser.sponsor_id) {
        break;
    }

    const sponsorId = currentUser.sponsor_id;

    const commission = Number(
        (rewardAmount * LEVEL_PERCENTAGES[level] / 100).toFixed(2)
    );
await creditUser(sponsorId, commission, true);
    const { data, error } = await supabaseClient
.from("offer_history")
.insert({
    user_id: sponsorId,
    from_user_id: userId,
    offer_id: submission.offer_id,
    reward: Math.round(commission),
    level: level,
    income_type: "level_income",
    status: "Approved"
})
.select();

if (error) {
  console.error(error);
  alert(JSON.stringify(error));
  return;
}

    currentMemberId = sponsorId;
      }
alert("Offer Approved Successfully & Wallet Updated");

loadOfferRequests();

  }
  async function rejectOffer(submissionId,userId){

if(!confirm("Reject this offer request?")) return;

const res=await fetch(

SUPABASE_URL+
"/rest/v1/offer_submissions?id=eq."+submissionId,

{

method:"PATCH",

headers:{

"apikey":SUPABASE_KEY,

"Authorization":"Bearer "+SUPABASE_KEY,

"Content-Type":"application/json",

"Prefer":"return=representation"

},

body:JSON.stringify({

status:"Rejected"

})

}

);

const result=await res.text();

if(!res.ok){

alert("Reject Error: "+result);

return;

}

alert("Offer Rejected Successfully");

loadOfferRequests();

}

loadOfferRequests();

</script>

</body>

</html>
