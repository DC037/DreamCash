<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Refer & Earn - DreamCash</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
padding-bottom:90px;
}

.header{
background:linear-gradient(135deg,#006bff,#00b7ff);
color:#fff;
padding:22px;
text-align:center;
border-radius:0 0 20px 20px;
}

.header h2{
font-size:24px;
}

.card{
background:#fff;
margin:15px;
padding:18px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:12px;
color:#0a5b95;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
font-size:15px;
}

.value{
font-weight:bold;
color:#111;
}

.linkBox{
margin-top:15px;
padding:15px;
border:2px dashed #0aa7d8;
background:#eefcff;
border-radius:15px;
font-size:14px;
font-weight:bold;
word-break:break-all;
text-align:center;
color:#006699;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:700;
margin-top:15px;
color:#fff;
cursor:pointer;
background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.35);
box-shadow:
0 10px 25px rgba(0,0,0,.18),
inset 0 1px 1px rgba(255,255,255,.6),
inset 0 -2px 8px rgba(0,0,0,.08);
transition:.25s;
}

.btn:active{
transform:scale(.97);
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.copyBtn{
background:linear-gradient(135deg,#00b894,#00d26a);
}

.shareBtn{
background:linear-gradient(135deg,#006bff,#00a8ff);
}

.historyBtn{
background:linear-gradient(135deg,#ff9800,#ffb300);
}

.backBtn{
background:linear-gradient(135deg,#555,#222);
}

</style>
</head>

<body>

<div class="header">
<h2>🤝 Refer & Earn</h2>
<p>Invite Friends & Earn Rewards</p>
</div>

<div class="card">

<div class="title">
👤 My Referral Details
</div>

<div style="
background:#f8fbff;
border:2px solid #e8f2ff;
border-radius:15px;
padding:15px;
margin-top:15px;
">

<div style="font-size:14px;color:#666;">
🆔 Member ID
</div>

<div id="memberId"
style="
font-size:26px;
font-weight:bold;
color:#006bff;
margin-top:5px;
">
Loading...
</div>

<hr style="margin:12px 0;border:none;border-top:1px solid #eee;">

<div style="font-size:14px;color:#666;">
👤 Member Name
</div>

<div id="userName"
style="
font-size:22px;
font-weight:bold;
color:#222;
margin-top:5px;
">
Loading...
</div>

</div>

<div style="display:flex;gap:12px;margin:18px 0;">

<div style="flex:1;background:linear-gradient(135deg,#0d6efd,#00b7ff);color:#fff;padding:15px;border-radius:15px;text-align:center;box-shadow:0 6px 15px rgba(0,0,0,.15);">

<div style="font-size:14px;">👥 Total Referrals</div>

<div id="totalRefer" style="font-size:28px;font-weight:bold;margin-top:8px;">
0
</div>

</div>

<div style="flex:1;background:linear-gradient(135deg,#00b894,#00d26a);color:#fff;padding:15px;border-radius:15px;text-align:center;box-shadow:0 6px 15px rgba(0,0,0,.15);">

<div style="font-size:14px;">💰 Referral Income</div>

<div id="refIncome" style="font-size:28px;font-weight:bold;margin-top:8px;">
0 DC
</div>

</div>

</div>

<div class="linkBox" id="referLink">

Loading Referral Link...

</div>

<button class="btn copyBtn"
onclick="copyReferral()">

📋 Copy Referral Link

</button>

<button class="btn shareBtn"
onclick="shareReferral()">

📤 Share Referral Link

</button>

<button class="btn historyBtn"
onclick="viewReferHistory()">

📜 Referral History

</button>

<button class="btn backBtn"
onclick="window.location.href='dashboard.html'">

⬅ Back To Dashboard

</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY="sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function loadReferralPage(){

const memberId=
localStorage.getItem("member_id")||
localStorage.getItem("last_member_id");

if(!memberId){
alert("Please Login Again");
location.href="login.html";
return;
}

const {data,error}=await supabaseClient
.from("users")
.select("*")
.eq("member_id",memberId)
.maybeSingle();

if(error||!data){
alert("User Not Found");
return;
}

document.getElementById("memberId").innerText=data.member_id;

document.getElementById("userName").innerText=
data.name||"User";

document.getElementById("totalRefer").innerText=
data.referral_count||0;

document.getElementById("refIncome").innerText=
(Number(data.referral_income)||0).toFixed(2)+" DC";

document.getElementById("referLink").innerText=
"https://dreamcashindia.com/login.html?register=1&ref="+
data.member_id;

}

function copyReferral(){

const txt=
document.getElementById("referLink").innerText;

navigator.clipboard.writeText(txt);

alert("Referral Link Copied");

}

function shareReferral(){

const txt=
document.getElementById("referLink").innerText;

if(navigator.share){

navigator.share({

title:"DreamCash",

text:"Join DreamCash & Earn Daily Rewards",

url:txt

});

}else{

window.open(
"https://wa.me/?text="+
encodeURIComponent(txt)
);

}

}
function viewReferHistory(){

window.location.href = "refer-history.html";
}
window.onload=loadReferralPage;

</script>
</body>
</html>
