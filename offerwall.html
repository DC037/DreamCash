<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamCash - Offer Wall</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

.header{
    background:#16a34a;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.offer-card{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.offer-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.offer-desc{
    color:#666;
    margin-bottom:10px;
}

.offer-reward{
    color:#16a34a;
    font-weight:bold;
    margin-bottom:10px;
}

.btn{
    width:100%;
    border:none;
    padding:12px;
    border-radius:8px;
    background:#16a34a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    background:#111827;
    color:white;
    padding:12px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
    Offer Wall
</div>

<div class="container">

    <div id="offersList">
    Loading offers...
    </div>

    <a href="dashboard.html" class="back-btn">
        Back To Dashboard
    </a>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqiuxvscfmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadOffers(){
  const box = document.getElementById("offersList");

  const { data, error } = await supabaseClient
    .from("offers")
    .select("*")
    .eq("status", "active")
    .order("created_at", { ascending: false });

  if(error){
    box.innerHTML = "Error: " + error.message;
    return;
  }

  if(!data || data.length === 0){
    box.innerHTML = "No active offers found";
    return;
  }

  let html = "";

  data.forEach(function(offer){
    html += `
      <div class="offer-card">
        <div class="offer-title">${offer.title}</div>
        <div class="offer-desc">${offer.description}</div>
        <div class="offer-reward">Reward: ${offer.reward} Coins</div>

        <button class="btn" onclick="window.open('${offer.offer_url}', '_blank')">
          Open Task
        </button>

        <br><br>

        <input type="file" accept="image/*">

        <br><br>

        <button class="btn">
          Upload Screenshot
        </button>
      </div>
    `;
  });

  box.innerHTML = html;
}

loadOffers().catch(err => {
  alert(err.message);
  document.getElementById("offersList").innerHTML =
  "JS Error: " + err.message;
});
</script>

</body>
</html>
