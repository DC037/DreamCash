<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamCash - Offer Wall</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

.header{
    background:#16a34a;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.offer-card{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.offer-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.offer-desc{
    color:#666;
    margin-bottom:10px;
}

.offer-reward{
    color:#16a34a;
    font-weight:bold;
    margin-bottom:10px;
}

.btn{
    width:100%;
    border:none;
    padding:12px;
    border-radius:8px;
    background:#16a34a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    background:#111827;
    color:white;
    padding:12px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
    Offer Wall
</div>

<div class="container">

    <div class="offer-card">
        <div class="offer-title">Install App</div>
        <div class="offer-desc">Install the app and complete signup.</div>
        <div class="offer-reward">Reward: 100 Coins</div>
        <button class="btn">Start Offer</button>
    </div>

    <div class="offer-card">
        <div class="offer-title">Watch Video</div>
        <div class="offer-desc">Watch full video and earn reward.</div>
        <div class="offer-reward">Reward: 50 Coins</div>
        <button class="btn">Start Offer</button>
    </div>

    <a href="dashboard.html" class="back-btn">
        Back To Dashboard
    </a>

</div>

</body>
</html>
