<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral History</title>

<style>
body{
margin:0;
padding:15px;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:linear-gradient(135deg,#006bff,#00b7ff);
color:#fff;
padding:18px;
border-radius:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#historyList{
margin-top:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div class="header">
📜 Referral History
</div>

<div id="historyList">

<div class="card">
Loading Referral History...
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
async function loadReferralHistory(){

const memberId =
localStorage.getItem("member_id") ||
localStorage.getItem("last_member_id");

if(!memberId){

alert("Please Login Again");

window.location.href = "login.html";

return;

}

document.getElementById("historyList").innerHTML =
"<div class='card'>Loading Referral History...</div>";
  const { data, error } = await supabaseClient
.from("users")
.select("*")
.eq("sponsor_id", memberId)
.order("created_at", { ascending: false });

if(error){

alert(error.message);

return;

}

if(!data || data.length===0){

document.getElementById("historyList").innerHTML =
"<div class='card'>No Referral Found</div>";

return;

}

document.getElementById("historyList").innerHTML =
"<div class='card'>Total Referrals : "+data.length+"</div>";

}

window.onload = loadReferralHistory;
</script>
</body>
</html>
