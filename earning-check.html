<!DOCTYPE html>
<html>
<head>
  <title>DreamCash Earning Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:Arial;
      background:#eef3f7;
      margin:0;
      padding:15px;
    }
    .card{
      background:white;
      padding:15px;
      border-radius:14px;
      margin-bottom:15px;
      box-shadow:0 4px 12px #0002;
    }
    h2{color:#0b6b7a;}
    input{
      width:100%;
      padding:12px;
      font-size:15px;
      margin-bottom:10px;
      box-sizing:border-box;
    }
    button{
      border:none;
      padding:11px 20px;
      border-radius:22px;
      color:white;
      font-weight:bold;
      background:linear-gradient(135deg,#00b75a,#20df83);
      box-shadow:0 5px 10px #0003;
    }
    .back{
      background:linear-gradient(135deg,#111827,#334155);
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .box{
      background:#f8fafc;
      padding:12px;
      border-radius:12px;
      border:1px solid #e5e7eb;
    }
    .big{
      font-size:20px;
      font-weight:bold;
      color:#0b6b7a;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }
    th,td{
      border:1px solid #ddd;
      padding:8px;
      text-align:left;
    }
    th{background:#0b6b7a;color:white;}
  </style>
</head>

<body>

  <h2>💰 DreamCash Earning Check</h2>

  <button class="back" onclick="window.location.href='admin.html'">⬅ Back Admin</button>

  <div class="card">
   <h3>🔍 Search User</h3>

    <input type="text" id="searchInput"
      placeholder="Member ID ya Mobile Number dalo">

    <button onclick="searchUserEarning()">Search</button>
  </div>

  <div id="resultBox"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function searchUserEarning(){
  const value = document.getElementById("searchInput").value.trim();
  const box = document.getElementById("resultBox");

  if(!value){
    alert("Member ID ya Mobile Number dalo");
    return;
  }

  box.innerHTML = "<div class='card'>Loading...</div>";

  const { data:user, error:userError } = await supabaseClient
    .from("users")
    .select("*")
    .or(`member_id.eq.${value},user_id.eq.${value},id.eq.${value},mobile.eq.${value},whatsapp.eq.${value},phone.eq.${value}`)
    .maybeSingle();

  if(userError || !user){
    box.innerHTML = "<div class='card'><b style='color:red'>User not found</b></div>";
    return;
  }

  const memberId = user.member_id;

  const { data:team } = await supabaseClient
    .from("users")
    .select("status")
    .eq("sponsor_id", memberId);

  let totalTeam = team ? team.length : 0;
  let activeTeam = 0;
  let inactiveTeam = 0;

  if(team){
    team.forEach(t=>{
      if(t.status === "Active") activeTeam++;
      else inactiveTeam++;
    });
  }

  const { data:incomeRows } = await supabaseClient
    .from("income_history")
    .select("*")
    .eq("user_id", memberId)
    .eq("status", "approved");

  const { data:dailyRows } = await supabaseClient
    .from("daily_claims")
    .select("*")
    .eq("user_id", memberId);

  const { data:offerRows } = await supabaseClient
    .from("offer_submissions")
    .select("*")
    .eq("user_id", memberId)
    .eq("status", "Approved");

  const { data:rankRows } = await supabaseClient
    .from("rank_reward_claims")
    .select("*")
    .eq("member_id", memberId);

  const { data:monthlyRows } = await supabaseClient
    .from("monthly_reward_claims")
    .select("*")
    .eq("user_id", memberId);

  let referIncome = 0;
  let spinIncome = 0;
  let scratchIncome = 0;
  let checkinIncome = 0;
  let offerIncome = 0;
  let rankIncome = 0;
  let monthlyIncome = 0;

  let history = [];

  if(incomeRows){
    incomeRows.forEach(r=>{
      referIncome += Number(r.amount || 0);
      history.push({
        date:r.created_at,
        source:"Refer / Level",
        amount:r.amount
      });
    });
  }

  if(dailyRows){
    dailyRows.forEach(r=>{
      const amount = Number(r.points || 0);

      if(r.task_type === "spin") spinIncome += amount;
      if(r.task_type === "scratch") scratchIncome += amount;
      if(r.task_type === "checkin") checkinIncome += amount;

      history.push({
        date:r.created_at || r.claim_date,
        source:r.task_type,
        amount:amount
      });
    });
  }

  if(offerRows){
    offerRows.forEach(r=>{
      offerIncome += Number(r.reward || 0);
      history.push({
        date:r.created_at,
        source:"Offer / Report",
        amount:r.reward
      });
    });
  }

  if(rankRows){
    rankRows.forEach(r=>{
      rankIncome += Number(r.reward_dc || 0);
      history.push({
        date:r.created_at,
        source:"Rank Reward",
        amount:r.reward_dc
      });
    });
  }

  if(monthlyRows){
    monthlyRows.forEach(r=>{
      monthlyIncome += Number(r.reward_amount || 0);
      history.push({
        date:r.claim_date,
        source:"Monthly Reward",
        amount:r.reward_amount
      });
    });
  }

  const totalEarning =
    referIncome + spinIncome + scratchIncome + checkinIncome +
    offerIncome + rankIncome + monthlyIncome;

  history.sort((a,b)=> new Date(b.date) - new Date(a.date));

  let html = `
    <div class="card">
      <h3>👤 User Details</h3>
      <b>Name:</b> ${user.full_name || user.name || "N/A"}<br>
      <b>Member ID:</b> ${memberId}<br>
      <b>Mobile:</b> ${user.mobile || user.whatsapp || "N/A"}<br>
      <b>Status:</b> ${user.status || "Inactive"}
    </div>

    <div class="card grid">
      <div class="box"><b>Total Team</b><div class="big">${totalTeam}</div></div>
      <div class="box"><b>Active Team</b><div class="big">${activeTeam}</div></div>
      <div class="box"><b>Inactive Team</b><div class="big">${inactiveTeam}</div></div>
      <div class="box"><b>Total Earning</b><div class="big">₹${totalEarning}</div></div>
    </div>

    <div class="card grid">
      <div class="box"><b>Refer Income</b><div class="big">₹${referIncome}</div></div>
      <div class="box"><b>Spin Income</b><div class="big">₹${spinIncome}</div></div>
      <div class="box"><b>Scratch Income</b><div class="big">₹${scratchIncome}</div></div>
      <div class="box"><b>Daily Checkin</b><div class="big">₹${checkinIncome}</div></div>
      <div class="box"><b>Offer / Report</b><div class="big">₹${offerIncome}</div></div>
      <div class="box"><b>Rank Reward</b><div class="big">₹${rankIncome}</div></div>
    </div>

    <div class="card">
      <h3>📜 Earning History</h3>
      <table>
        <tr>
          <th>Date</th>
          <th>Source</th>
          <th>Amount</th>
        </tr>
  `;

  if(history.length === 0){
    html += `<tr><td colspan="3">No earning history found</td></tr>`;
  } else {
    history.forEach(h=>{
      html += `
        <tr>
          <td>${h.date ? new Date(h.date).toLocaleString() : "-"}</td>
          <td>${h.source}</td>
          <td>₹${h.amount || 0}</td>
        </tr>
      `;
    });
  }

  html += `
      </table>
    </div>
  `;

  box.innerHTML = html;
            }
  </script>

</body>
</html>
