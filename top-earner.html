<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Earner</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b1220;
font-family:Arial,sans-serif;
color:#fff;
}

.header{
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
background:#111827;
box-shadow:0 2px 10px rgba(0,0,0,.4);
}

.backBtn{
margin:15px;
padding:10px 18px;
background:#22c55e;
color:#fff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.loading{
text-align:center;
padding:30px;
color:#94a3b8;
}

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:18px;
margin:40px 12px 30px;
flex-wrap:nowrap;
overflow:visible;
padding-bottom:10px;
}

.topBox{
flex:1;
width:30%;
min-width:105px;
max-width:140px;
border-radius:20px;
padding:18px 10px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.35);
transition:.3s;
}

.topBox:hover{
transform:translateY(-6px);
}

.first{
order:2;
min-height:220px;
background:linear-gradient(180deg,#ffd54f,#f59e0b);
color:#111;
}

.second{
order:1;
min-height:180px;
background:linear-gradient(180deg,#e5e7eb,#94a3b8);
color:#111;
}

.third{
order:3;
min-height:180px;
background:linear-gradient(180deg,#d97706,#78350f);
}

.medal{
font-size:40px;
margin-bottom:8px;
}

.rank{
font-size:26px;
font-weight:bold;
}

.name{
font-size:18px;
font-weight:bold;
margin-top:8px;
}

.member,
.team{
font-size:13px;
margin-top:5px;
}

.earning{
margin-top:10px;
font-size:24px;
font-weight:bold;
color:#16a34a;
}

.rankCard{
background:#1e293b;
margin:12px;
padding:16px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.25);
}

.right{
text-align:right;
}

.small{
font-size:12px;
color:#cbd5e1;
}
</style>

</head>

<body>

<div class="header">🏆 Top Earner</div>
<button class="backBtn" onclick="window.location.href='dashboard.html'">← Back</button>

<div id="leaderboard">
  <div class="loading">Loading top earners...</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadLeaderboard(){
  const box = document.getElementById("leaderboard");

  try{
    const { data, error } = await supabaseClient
      .from("users")
      .select("name, member_id, referral_count, referral_income")
      .order("referral_income", { ascending:false })
      .limit(15);

    if(error){
      box.innerHTML = "<div class='loading' style='color:#ef4444;'>Data load error: " + error.message + "</div>";
      return;
    }

    if(!data || data.length === 0){
      box.innerHTML = "<div class='loading'>No earning data found</div>";
      return;
    }

    let topHtml = "<div class='podium'>";

    data.slice(0,3).forEach(function(user,index){
      let cls = index === 0 ? "first" : index === 1 ? "second" : "third";
      let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : "🥉";

      topHtml += `
        <div class="topBox ${cls}">
          <div class="medal">${medal}</div>

<div style="
width:80px;
height:80px;
border-radius:50%;
background:#ffffff;
margin:10px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
color:#111;
border:4px solid rgba(255,255,255,.7);
box-shadow:0 6px 18px rgba(0,0,0,.3);
">
👤
</div>
          <div class="rank">#${index+1}</div>
          <div class="name">${user.name || "User"}</div>
          <div class="member">ID : ${user.member_id || "-"}</div>
          <div class="team">Team : ${user.referral_count || 0}</div>
          <div class="earning">₹${Number(user.referral_income || 0).toFixed(2)}</div>
        </div>
      `;
    });

    topHtml += "</div>";

    let listHtml = "";

    data.slice(3,15).forEach(function(user,index){
      listHtml += `
        <div class="rankCard">
          <div>
            <div class="rank">#${index+4}</div>
            <div class="name">${user.name || "User"}</div>
            <div class="member">ID : ${user.member_id || "-"}</div>
            <div class="team">Total Team : ${user.referral_count || 0}</div>
          </div>
          <div class="right">
            <div class="earning">₹${Number(user.referral_income || 0).toFixed(2)}</div>
            <div class="small">Total Earning</div>
          </div>
        </div>
      `;
    });

    box.innerHTML = topHtml + listHtml;

  }catch(err){
  box.innerHTML = "<div class='loading' style='color:#ef4444;'>"
    + "Error name: " + err.name + "<br>"
    + "Error message: " + err.message + "<br>"
    + "Full error: " + JSON.stringify(err)
    + "</div>";
  }
}

loadLeaderboard();
</script>

</body>
</html>
