<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Earner</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
}

.header{
background:#111827;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.backBtn{
margin:15px;
padding:10px 18px;
background:#22c55e;
color:#fff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.podium{
  display:flex;
  justify-content:center;
  align-items:end;
  gap:10px;
  margin:35px 12px 20px;
}

.topBox{
  background:#1e293b;
  border-radius:18px;
  padding:15px 8px;
  text-align:center;
  width:30%;
  box-shadow:0 4px 12px rgba(0,0,0,.35);
}

.topBox.first{
  background:linear-gradient(135deg,#facc15,#f59e0b);
  color:#111827;
  min-height:150px;
  order:2;
}

.topBox.second{
  background:linear-gradient(135deg,#cbd5e1,#64748b);
  min-height:125px;
  order:1;
}

.topBox.third{
  background:linear-gradient(135deg,#b45309,#78350f);
  min-height:115px;
  order:3;
}

.rankCard{
  background:#1e293b;
  margin:10px 12px;
  padding:14px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.rank{font-size:20px;font-weight:bold;color:#facc15;}
.name{font-size:16px;font-weight:bold;}
.member,.team{font-size:12px;color:#cbd5e1;}
.earning{font-size:18px;font-weight:bold;color:#22c55e;}
.right{text-align:right;}
  <style>
</head>

<body>

<div class="header">🏆 Top Earner</div>

<button class="backBtn"
onclick="window.location.href='dashboard.html'">
← Back
</button>

<div id="leaderboard"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://baqiuuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY =
"sb_publishable_M-R7UOrWf2JPMefVzPAQRw_mjTphJ_1";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function loadLeaderboard(){

const { data, error } = await supabaseClient
.from("users")
.select(`
name,
member_id,
referral_count,
referral_income
`)
.order("referral_income",{ascending:false})
.limit(15);

if(error){
console.log(error);
return;
}
  if(!data || data.length === 0){
document.getElementById("leaderboard").innerHTML =
"<div style='text-align:center;margin-top:30px;color:#94a3b8;'>No earning data found</div>";
return;
  }

let html = "";

let topHtml = "<div class='podium'>";

data.slice(0,3).forEach((user,index)=>{
  let cls = index === 0 ? "first" : index === 1 ? "second" : "third";
  let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : "🥉";

  topHtml += `
    <div class="topBox ${cls}">
      <div style="font-size:30px">${medal}</div>
      <div class="rank">#${index+1}</div>
      <div class="name">${user.name || "User"}</div>
      <div class="member">ID : ${user.member_id || "-"}</div>
      <div class="team">Team : ${user.referral_count || 0}</div>
      <div class="earning">₹${Number(user.referral_income || 0).toFixed(2)}</div>
    </div>
  `;
});

topHtml += "</div>";

let listHtml = "";

data.slice(3,15).forEach((user,index)=>{
  listHtml += `
    <div class="rankCard">
      <div>
        <div class="rank">#${index+4}</div>
        <div class="name">${user.name || "User"}</div>
        <div class="member">ID : ${user.member_id || "-"}</div>
        <div class="team">Total Team : ${user.referral_count || 0}</div>
      </div>
      <div class="right">
        <div class="earning">₹${Number(user.referral_income || 0).toFixed(2)}</div>
        <div>Total Earning</div>
      </div>
    </div>
  `;
});

document.getElementById("leaderboard").innerHTML = topHtml + listHtml;

}

loadLeaderboard();

</script>

</body>
</html>
