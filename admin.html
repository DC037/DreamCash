    /* ===== Admin Panel 3D Glossy Buttons ===== */

button,
.btn,
.tab,
.admin-tab,
.action-btn,
.approve-btn,
.reject-btn{
  border:none !important;
  border-radius:20px !important;
  padding:10px 20px !important;
  font-weight:900 !important;
  color:white !important;
  cursor:pointer !important;
  position:relative !important;
  overflow:hidden !important;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.55),
    inset 0 -5px 9px rgba(0,0,0,.22),
    0 5px 0 rgba(0,0,0,.18),
    0 9px 15px rgba(0,0,0,.18) !important;
  transition:.15s ease !important;
}

button::before,
.btn::before,
.tab::before,
.admin-tab::before,
.action-btn::before,
.approve-btn::before,
.reject-btn::before{
  content:"";
  position:absolute;
  top:-55%;
  left:-35%;
  width:90%;
  height:100%;
  background:linear-gradient(135deg,rgba(255,255,255,.65),rgba(255,255,255,.05));
  transform:rotate(25deg);
  pointer-events:none;
}

button:active,
.btn:active,
.tab:active,
.admin-tab:active,
.action-btn:active,
.approve-btn:active,
.reject-btn:active{
  transform:translateY(4px) scale(.98) !important;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.45),
  0 2px 0 rgba(0,0,0,.20) !important;
}

/* Approve green */
button[onclick*="approve"],
.approve-btn{
  background:linear-gradient(135deg,#00b75a,#20df83) !important;
}

/* Reject red */
button[onclick*="reject"],

}

 async function approveMonthlyReward(id){

    if(!confirm("Approve this monthly reward request?")) return;

    const { data: claim, error } = await supabaseClient
        .from("monthly_reward_claims")
        .select("*")
        .eq("id", id)
        .single();

    if(error || !claim){
        alert("Claim not found");
        return;
    }

    if(claim.status === "Approved"){
        alert("Already approved");
        return;
    }

    const { data:user } = await supabaseClient
        .from("users")
        .select("wallet")
        .eq("member_id", claim.member_id)
        .single();

    const newWallet = Number(user.wallet || 0) + Number(claim.reward || 0);

    await supabaseClient
        .from("users")
        .update({
            wallet:newWallet
        })
        .eq("member_id", claim.member_id);

    await supabaseClient
        .from("monthly_reward_claims")
        .update({
            status:"Approved"
        })
        .eq("id", id);

    alert("Monthly Reward Approved");

    loadMonthlyRewardClaims();
 }

    alert("Monthly Reward Rejected");

         }

  `;

async function addBalance(userId) {
  const amount = parseFloat(prompt("Enter amount to add"));
  if (!amount || amount <= 0) return;

  const { data: userData, error: fetchError } = await supabaseClient
    .from("users")
    .select("wallet")
    .eq("member_id", userId)
    .single();

  if (fetchError || !userData) {
    alert("User wallet fetch error");
    return;
  }

  const newWallet = Number(userData.wallet || 0) + amount;

  const { error } = await supabaseClient
    .from("users")
    .update({ wallet: newWallet })
    .eq("member_id", userId);

  if (error) {
    alert("Balance add error: " + error.message);
    return;
  }

  alert("Balance added successfully");
  searchMember();
}

async function cutBalance(userId) {
  const amount = parseFloat(prompt("Enter amount to cut"));
  if (!amount || amount <= 0) return;

  const { data: userData, error: fetchError } = await supabaseClient
    .from("users")
    .select("wallet")
    .eq("member_id", userId)
    .single();

  if (fetchError || !userData) {
    alert("User wallet fetch error");
    return;
  }

  const oldWallet = Number(userData.wallet || 0);

  if (amount > oldWallet) {
    alert("User ke wallet me itna balance nahi hai");
    return;
  }

  const newWallet = oldWallet - amount;

  const { error } = await supabaseClient
    .from("users")
    .update({ wallet: newWallet })
    .eq("member_id", userId);

  if (error) {
    alert("Balance cut error: " + error.message);
    return;
  }

  alert("Balance cut successfully");
  searchMember();
}

async function viewUserWithdrawals(userId) {
  try {
    const snap = await db.collection("withdrawals")
      .where("userId", "==", userId)
      .get();

    if (snap.empty) {
      alert("No withdrawal requests found");
      return;
    }

    let text = "Withdrawal History:\n\n";

    snap.forEach(doc => {
      const d = doc.data();
      text +=
        "Amount: ₹" + d.amount + "\n" +
        "UPI: " + d.upiId + "\n" +
        "Status: " + d.status + "\n\n";
    });

    alert(text);

  } catch(error) {
    alert(error.message);
  }
}

async function viewUserReferrals(userId) {
  const userDoc = await db.collection("users").doc(userId).get();

  if (!userDoc.exists) {
    alert("User not found");
    return;
  }

  const data = userDoc.data();
  const list = data.joinedUsers || [];

  if (list.length === 0) {
    alert("No referrals found");
    return;
  }

  let text = "Referral List:\n\n";

  list.forEach((u, i) => {
    text +=
      (i + 1) + ". Name: " + (u.name || "N/A") + "\n" +
      "Mobile: " + (u.whatsapp || "N/A") + "\n" +
      "Email: " + (u.email || "N/A") + "\n" +
      "Status: " + (u.status || "N/A") + "\n\n";
  });

  alert(text);
}
