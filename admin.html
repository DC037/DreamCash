<!DOCTYPE html>
<html>
<head>
  <title>DreamCash Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{font-family:Arial;background:#eef3f7;margin:0;padding:15px;}
    .card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 3px 10px #0001;}
    h2{color:#0b6b7a;}
    .row{border-bottom:1px solid #eee;padding:10px 0;}
    .btn{
border:none;
padding:10px 18px;
border-radius:20px;
color:white;
font-weight:bold;
font-size:14px;
min-width:90px;
text-align:center;
margin-right:8px;
    }
    .green{background:#16c784;}
    .red{background:#e74c3c;}
    .status{font-weight:bold;}
.status.approved{color:green;}
.status.rejected{color:red;}
.status.pending{color:#e67e22;}
  </style>
</head>
<body>

  <h2>DreamCash Admin Panel</h2>
<div class="card">
  <h3>🔍 Member Search</h3>

  <input type="text" id="searchMemberId"
  placeholder="Enter Member ID (DC1001)"
  style="width:100%;padding:10px;margin-bottom:10px;">

  <button class="btn green" onclick="searchMember()">
    Search Member
  </button>

  <div id="memberResult"></div>
</div>
  <div class="card">
    <h3>Withdrawal Requests</h3>
    <div id="withdrawalList">Loading...</div>
  </div>
<div class="card">
<h3>✅ Activation Requests</h3>
<div id="activationList">Loading...</div>
</div>
  <div class="card">
  <h3>🏆 Rank Reward Claims</h3>
  <div id="rankRewardClaimsList">Loading...</div>
  </div>
  <div class="card">
<h3>👥 DreamCash Team</h3>

<div id="teamStats">
Loading...
</div>

<button class="btn green" onclick="loadDreamCashTeam()">
Refresh Team
</button>

  </div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVIHJ66pEI6A3HmSmaOLNsFanatv-yhic",
  authDomain: "dreamcash-dafb4.firebaseapp.com",
  projectId: "dreamcash-dafb4",
  storageBucket: "dreamcash-dafb4.firebasestorage.app",
  messagingSenderId: "66002195487",
  appId: "1:66002195487:web:6fb777fca2630c466a312a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
async function loadWithdrawals(){
  const box = document.getElementById("withdrawalList");
  box.innerHTML = "Loading...";

  const snap = await db.collection("withdrawals")
    .orderBy("createdAt", "desc")
    .get();

  if(snap.empty){
    box.innerHTML = "No withdrawal requests found.";
    return;
  }

  let html = "";

  for (const doc of snap.docs) {
    const d = doc.data();
let userName = "Unknown";
let memberId = "N/A";

try {
  const userDoc = await db.collection("users").doc(d.userId).get();

  if (userDoc.exists) {
    userName = userDoc.data().name || "Unknown";
    memberId = userDoc.data().memberId || "N/A";
  }
} catch (e) {}
    html += `
      <div class="row">
        <b>Amount:</b> ₹${d.amount}<br>
        <b>UPI:</b> ${d.upiId}<br>
        <b>Name:</b> ${userName}<br>
<b>Member ID:</b> ${memberId}<br>
        <b>User ID:</b> ${d.userId}<br>
        <b>Status:</b> 
<span class="status ${d.status === 'Approved' ? 'approved' : d.status === 'Rejected' ? 'rejected' : 'pending'}">
${d.status === 'Approved' ? '✅' : d.status === 'Rejected' ? '❌' : '⏳'} ${d.status}
</span><br><br>

        <button class="btn green" onclick="approveWithdrawal('${doc.id}')">Approve</button>
        <button class="btn red" onclick="rejectWithdrawal('${doc.id}')">Reject</button>
      </div>
    `;
  }

  box.innerHTML = html;
}
async function loadActivationRequests(){

const box = document.getElementById("activationList");
box.innerHTML = "Loading...";

const snap = await db.collection("activationRequests")
.orderBy("createdAt","desc")
.get();

if(snap.empty){
box.innerHTML = "No activation requests found.";
return;
}

let html = "";

for (const doc of snap.docs) {

const d = doc.data();
let userName = "Unknown";
let memberId = "N/A";

try {
  const userDoc = await db.collection("users").doc(d.userId).get();

  if (userDoc.exists) {
    userName = userDoc.data().name || "Unknown";
    memberId = userDoc.data().memberId || "N/A";
  }
} catch (e) {}
html += `
<div class="row">
<b>Amount:</b> ₹${d.amount}<br>
<b>Transaction ID:</b> ${d.transactionId}<br>
<b>Name:</b> ${userName}<br>
<b>Member ID:</b> ${memberId}<br>
<b>User ID:</b> ${d.userId}<br>
<b>Status:</b>
<span class="status ${d.status === 'Approved' ? 'approved' : d.status === 'Rejected' ? 'rejected' : 'pending'}">
${d.status === 'Approved' ? '✅' : d.status === 'Rejected' ? '❌' : '⏳'} ${d.status}
</span><br><br>

<button class="btn green"
onclick="approveActivation('${doc.id}','${d.userId}')">
Activate
</button>

<button class="btn red"
onclick="rejectActivation('${doc.id}','${d.userId}')">
Reject
</button>

</div>
`;
}

box.innerHTML = html;
}
  async function approveActivation(id,userId){
const reqRef = db.collection("activationRequests").doc(id);
const reqDoc = await reqRef.get();
const reqData = reqDoc.data();

if(reqData.status === "Approved"){
  alert("Already Approved");
  return;
}
await db.collection("users").doc(userId).update({
isActive: true,
activationDate: firebase.firestore.FieldValue.serverTimestamp()
});

await reqRef.update({
status: "Approved"
});
await distributeLevelIncome(userId);
alert("User Activated Successfully");

loadActivationRequests();

  }
  async function distributeLevelIncome(userId){

const levelAmounts = [25, 10, 5, 5, 5];

let userDoc = await db.collection("users").doc(userId).get();
let userData = userDoc.data();

let uplineCode = userData.referredBy;

for(let i = 0; i < 5; i++){

if(!uplineCode){ break; }

const snap = await db.collection("users")
.where("myReferralCode", "==", uplineCode)
.limit(1)
.get();

if(snap.empty){ break; }

const uplineDoc = snap.docs[0];
const uplineData = uplineDoc.data();

const amount = levelAmounts[i];

await db.collection("users").doc(uplineDoc.id).update({
  balance: firebase.firestore.FieldValue.increment(amount),
  referralIncome: firebase.firestore.FieldValue.increment(amount)
});

await db.collection("incomeHistory").add({
uid: uplineDoc.id,
fromUserId: userId,
type: "Level " + (i + 1) + " Income",
amount: amount,
note: "Income from account activation",
createdAt: firebase.firestore.FieldValue.serverTimestamp()
});

uplineCode = uplineData.referredBy;

}

  }
  async function rejectActivation(id,userId){

await db.collection("users").doc(userId).update({
isActive: false,
activationDate: null
});

await db.collection("activationRequests").doc(id).update({
status: "Rejected"
});

alert("Activation Request Rejected");

loadActivationRequests();

  }
async function approveWithdraw(id){
try{
const withdrawRef = db.collection("withdrawals").doc(id);
const withdrawDoc = await withdrawRef.get();
const w = withdrawDoc.data();

if(w.status === "Approved"){
alert("Already Approved");
return;
}

await withdrawRef.update({
status: "Approved",
approvedAt: firebase.firestore.FieldValue.serverTimestamp()
});

alert("Withdrawal Approved");
loadWithdrawals();

}catch(error){
alert("Approve Failed: " + error.message);
}
}

async function rejectWithdraw(id){
try{
const reqRef = db.collection("withdrawals").doc(id);
const reqDoc = await reqRef.get();
const reqData = reqDoc.data();

if(reqData.status === "Rejected"){
alert("Already Rejected");
return;
}

if(reqData.status === "Pending"){
const userId = reqData.userId || reqData.uid;

await db.collection("users").doc(userId).update({
balance: firebase.firestore.FieldValue.increment(Number(reqData.amount))
});
}

await reqRef.update({
status: "Rejected",
rejectedAt: firebase.firestore.FieldValue.serverTimestamp()
});

alert("Withdrawal Rejected & Balance Refunded");
loadWithdrawals();

}catch(error){
alert("Reject Failed: " + error.message);
}
}

  let html = "";

  for (const doc of snap.docs) {
    const d = doc.data();

    let userName = "N/A";
    let userMobile = "N/A";

    if(d.userId){
      const userDoc = await db.collection("users").doc(d.userId).get();

      if(userDoc.exists){
        const u = userDoc.data();
        userName = u.name || u.fullName || u.username || "N/A";
        userMobile = u.mobile || u.phone || u.number || "N/A";
      }
    }

    html += `
    <div class="row">
      <b>User Name:</b> ${userName}<br>
      <b>Mobile:</b> ${userMobile}<br>
      <b>User ID:</b> ${d.userId || "N/A"}<br>
      <b>Rank:</b> ${d.rank || "N/A"}<br>
      <b>Reward:</b> ${d.reward || d.amount || 0} DC<br>
      <b>Status:</b>
      <span class="status ${d.status === 'Approved' ? 'approved' : d.status === 'Rejected' ? 'rejected' : 'pending'}">
        ${d.status === 'Approved' ? '✅' : d.status === 'Rejected' ? '❌' : '⏳'} ${d.status || "Pending"}
      </span><br><br>

      <button class="btn green" onclick="approveRankReward('${doc.id}')">Approve</button>
      <button class="btn red" onclick="rejectRankReward('${doc.id}')">Reject</button>
    </div>
    `;
  }

  box.innerHTML = html;
}

async function approveRankReward(id){
  await db.collection("rankRewardClaims").doc(id).update({
    status: "Approved"
  });

  alert("Rank Reward Approved");
  loadRankRewardClaims();
}

async function rejectRankReward(id){
  await db.collection("rankRewardClaims").doc(id).update({
    status: "Rejected"
  });

  alert("Rank Reward Rejected");
  loadRankRewardClaims();
}

loadWithdrawals();
  loadActivationRequests();
  loadRankRewardClaims();
  loadDreamCashTeam();
  async function loadDreamCashTeam(){

const box = document.getElementById("teamStats");

const snap = await db.collection("users").get();

let totalTeam = 0;
let activeTeam = 0;
let inactiveTeam = 0;

snap.forEach(doc => {
const d = doc.data();

totalTeam++;

if(d.isActive === true){
activeTeam++;
}else{
inactiveTeam++;
}
});

box.innerHTML = `
<div class="row"><b>Total Team:</b> ${totalTeam}</div>
<div class="row"><b>Active Team:</b> ${activeTeam}</div>
<div class="row"><b>Inactive Team:</b> ${inactiveTeam}</div>
`;

  }
  async function searchMember() {

const memberId = document.getElementById("searchMemberId").value.trim();

if(!memberId){
alert("Enter Member ID");
return;
}

const snap = await db.collection("users")
.where("memberId","==",memberId)
.limit(1)
.get();

if(snap.empty){
document.getElementById("memberResult").innerHTML =
"<p style='color:red'>Member Not Found</p>";
return;
}

const d = snap.docs[0].data();
const userId = snap.docs[0].id;
document.getElementById("memberResult").innerHTML = `
<div class="row">
<b>Name:</b> ${d.fullName || "N/A"}<br>
<b>Member ID:</b> ${d.memberId || "N/A"}<br>
<b>Mobile:</b> ${d.whatsapp || "N/A"}<br>
<b>Email:</b> ${d.email || "N/A"}<br>
<b>Status:</b> ${d.isActive ? "Active" : "Inactive"}<br>
<b>Ban Status:</b> ${d.isBanned ? "Banned" : "Not Banned"}<br>
<b>Balance:</b> ${d.balance || 0} DC<br>
<b>Total Refer:</b> ${d.referralCount || 0}<br>
<b>Referral Income:</b> ${d.referralIncome || 0} DC<br>
<br>
<button class="btn green" onclick="addBalance('${userId}')">Add Balance</button>
<button class="btn red" onclick="cutBalance('${userId}')">Cut Balance</button>
<button class="btn green" onclick="makeActive('${userId}')">Active</button>
<button class="btn red" onclick="makeInactive('${userId}')">Inactive</button>
<button class="btn green" onclick='sendReset("${d.email}")'>Send Password Reset</button>
<button class="btn red" onclick="banUser('${userId}')">Ban</button>
<button class="btn green" onclick="unbanUser('${userId}')">Unban</button>
<button class="btn green" onclick='viewUserWithdrawals("${userId}")'>View Withdrawals</button>

<button class="btn green" onclick='viewUserReferrals("${userId}")'>View Referrals</button>
</div>
`;
}
  async function addBalance(userId) {
  const amount = parseFloat(prompt("Enter amount to add"));
  if (!amount) return;

  await db.collection("users").doc(userId).update({
    balance: firebase.firestore.FieldValue.increment(amount)
  });

  alert("Balance added");
  searchMember();
}

async function cutBalance(userId) {
  const amount = parseFloat(prompt("Enter amount to cut"));
  if (!amount) return;

  await db.collection("users").doc(userId).update({
    balance: firebase.firestore.FieldValue.increment(-amount)
  });

  alert("Balance cut");
  searchMember();
}

async function makeActive(userId) {
  await db.collection("users").doc(userId).update({
    status: "Active",
    isActive: true
  });

  alert("User Activated");
  searchMember();
}

async function makeInactive(userId) {
  await db.collection("users").doc(userId).update({
    status: "Inactive",
    isActive: false
  });

  alert("User Inactive");
  searchMember();
}
  
async function banUser(userId) {
  await db.collection("users").doc(userId).update({
    isBanned: true,
    banStatus: "Banned"
  });

  alert("User Banned Successfully");
  searchMember();
}

async function unbanUser(userId) {
  await db.collection("users").doc(userId).update({
    isBanned: false,
    banStatus: "Active"
  });

  alert("User Unbanned Successfully");
  searchMember();
}
  
async function sendReset(email) {
    try {
        if (!email || email === "N/A") {
            alert("Email not found");
            return;
        }

        await auth.sendPasswordResetEmail(email);
        alert("Password reset link sent successfully");
    } catch(error) {
        alert(error.message);
    }
  }
async function viewUserWithdrawals(userId) {
  try {
    const snap = await db.collection("withdrawals")
      .where("userId", "==", userId)
      .get();

    if (snap.empty) {
      alert("No withdrawal requests found");
      return;
    }

    let text = "Withdrawal History:\n\n";

    snap.forEach(doc => {
      const d = doc.data();
      text +=
        "Amount: ₹" + d.amount + "\n" +
        "UPI: " + d.upiId + "\n" +
        "Status: " + d.status + "\n\n";
    });

    alert(text);

  } catch(error) {
    alert(error.message);
  }
}
async function viewUserReferrals(userId) {
  const userDoc = await db.collection("users").doc(userId).get();

  if (!userDoc.exists) {
    alert("User not found");
    return;
  }

  const data = userDoc.data();
  const list = data.joinedUsers || [];

  if (list.length === 0) {
    alert("No referrals found");
    return;
  }

  let text = "Referral List:\n\n";

  list.forEach((u, i) => {
    text +=
      (i + 1) + ". Name: " + (u.name || "N/A") + "\n" +
      "Mobile: " + (u.whatsapp || "N/A") + "\n" +
      "Email: " + (u.email || "N/A") + "\n" +
      "Status: " + (u.status || "N/A") + "\n\n";
  });

  alert(text);
}
</script>

</body>
</html>
