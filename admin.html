<!DOCTYPE html>
<html>
<head>
  <title>DreamCash Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{font-family:Arial;background:#eef3f7;margin:0;padding:15px;}
    .card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 3px 10px #0001;}
    h2{color:#0b6b7a;}
    .row{border-bottom:1px solid #eee;padding:10px 0;}
    .btn{
border:none;
padding:10px 18px;
border-radius:20px;
color:white;
font-weight:bold;
font-size:14px;
min-width:90px;
text-align:center;
margin-right:8px;
    }
    .green{background:#16c784;}
    .red{background:#e74c3c;}
    .status{font-weight:bold;}
.status.approved{color:green;}
.status.rejected{color:red;}
.status.pending{color:#e67e22;}
  </style>
</head>
<body>

  <h2>DreamCash Admin Panel</h2>

  <div class="card">
    <h3>Withdrawal Requests</h3>
    <div id="withdrawalList">Loading...</div>
  </div>
<div class="card">
<h3>✅ Activation Requests</h3>
<div id="activationList">Loading...</div>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVIHJ66pEI6A3HmSmaOLNsFanatv-yhic",
  authDomain: "dreamcash-dafb4.firebaseapp.com",
  projectId: "dreamcash-dafb4",
  storageBucket: "dreamcash-dafb4.firebasestorage.app",
  messagingSenderId: "66002195487",
  appId: "1:66002195487:web:6fb777fca2630c466a312a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadWithdrawals(){
  const box = document.getElementById("withdrawalList");
  box.innerHTML = "Loading...";

  const snap = await db.collection("withdrawals")
    .orderBy("createdAt", "desc")
    .get();

  if(snap.empty){
    box.innerHTML = "No withdrawal requests found.";
    return;
  }

  let html = "";

  snap.forEach(doc => {
    const d = doc.data();

    html += `
      <div class="row">
        <b>Amount:</b> ₹${d.amount}<br>
        <b>UPI:</b> ${d.upiId}<br>
        <b>User ID:</b> ${d.userId}<br>
        <b>Status:</b> 
<span class="status ${d.status === 'Approved' ? 'approved' : d.status === 'Rejected' ? 'rejected' : 'pending'}">
${d.status === 'Approved' ? '✅' : d.status === 'Rejected' ? '❌' : '⏳'} ${d.status}
</span><br><br>

        <button class="btn green" onclick="approveWithdrawal('${doc.id}')">Approve</button>
        <button class="btn red" onclick="rejectWithdrawal('${doc.id}')">Reject</button>
      </div>
    `;
  });

  box.innerHTML = html;
}
async function loadActivationRequests(){

const box = document.getElementById("activationList");
box.innerHTML = "Loading...";

const snap = await db.collection("activationRequests")
.orderBy("createdAt","desc")
.get();

if(snap.empty){
box.innerHTML = "No activation requests found.";
return;
}

let html = "";

snap.forEach(doc => {

const d = doc.data();

html += `
<div class="row">
<b>Amount:</b> ₹${d.amount}<br>
<b>Transaction ID:</b> ${d.transactionId}<br>
<b>User ID:</b> ${d.userId}<br>
<b>Email:</b> ${d.email}<br>
${d.screenshotUrl ? `<b>Screenshot:</b> <a href="${d.screenshotUrl}" target="_blank">View Screenshot</a><br>` : `<b>Screenshot:</b> Not Uploaded<br>`}
<b>Status:</b>
<span class="status ${d.status === 'Approved' ? 'approved' : d.status === 'Rejected' ? 'rejected' : 'pending'}">
${d.status === 'Approved' ? '✅' : d.status === 'Rejected' ? '❌' : '⏳'} ${d.status}
</span><br><br>

<button class="btn green"
onclick="approveActivation('${doc.id}','${d.userId}')">
Activate
</button>

<button class="btn red"
onclick="rejectActivation('${doc.id}','${d.userId}')">
Reject
</button>

</div>
`;
});

box.innerHTML = html;
}
  async function approveActivation(id,userId){
const reqRef = db.collection("activationRequests").doc(id);
const reqDoc = await reqRef.get();
const reqData = reqDoc.data();

if(reqData.status === "Approved"){
  alert("Already Approved");
  return;
}
await db.collection("users").doc(userId).update({
isActive: true,
activationDate: firebase.firestore.FieldValue.serverTimestamp()
});

await reqRef.update({
status: "Approved"
});
await distributeLevelIncome(userId);
alert("User Activated Successfully");

loadActivationRequests();

  }
  async function distributeLevelIncome(userId){

const levelAmounts = [25, 10, 5, 5, 5];

let userDoc = await db.collection("users").doc(userId).get();
let userData = userDoc.data();

let uplineCode = userData.referredBy;

for(let i = 0; i < 5; i++){

if(!uplineCode){ break; }

const snap = await db.collection("users")
.where("myReferralCode", "==", uplineCode)
.limit(1)
.get();

if(snap.empty){ break; }

const uplineDoc = snap.docs[0];
const uplineData = uplineDoc.data();

const amount = levelAmounts[i];

await db.collection("users").doc(uplineDoc.id).update({
  balance: firebase.firestore.FieldValue.increment(amount),
  referralIncome: firebase.firestore.FieldValue.increment(amount)
});

await db.collection("incomeHistory").add({
userId: uplineDoc.id,
fromUserId: userId,
type: "Level " + (i + 1) + " Income",
amount: amount,
note: "Income from account activation",
createdAt: firebase.firestore.FieldValue.serverTimestamp()
});

uplineCode = uplineData.referredBy;

}

  }
  async function rejectActivation(id,userId){

await db.collection("users").doc(userId).update({
isActive: false,
activationDate: null
});

await db.collection("activationRequests").doc(id).update({
status: "Rejected"
});

alert("Activation Request Rejected");

loadActivationRequests();

  }
async function approveWithdrawal(id){

  const withdrawRef = db.collection("withdrawals").doc(id);
  const withdrawDoc = await withdrawRef.get();
  const w = withdrawDoc.data();

  if(w.status === "Approved"){
    alert("Already Approved");
    return;
  }

  const userRef = db.collection("users").doc(w.userId);

  await db.runTransaction(async (transaction) => {

    const userDoc = await transaction.get(userRef);
    const userData = userDoc.data();

    const currentBalance = Number(userData.balance || 0);
    const newBalance = currentBalance - Number(w.amount);

    transaction.update(userRef,{
      balance: newBalance
    });

    transaction.update(withdrawRef,{
      status: "Approved",
      deducted: true
    });

  });

  alert("Withdrawal Approved & Balance Deducted");
  loadWithdrawals();
}
async function rejectWithdrawal(id){
  await db.collection("withdrawals").doc(id).update({
    status: "Rejected"
  });

  alert("Withdrawal Rejected");
  loadWithdrawals();
}

loadWithdrawals();
  loadActivationRequests();
</script>

</body>
</html>
