    /* ===== Admin Panel 3D Glossy Buttons ===== */

button,
.btn,
.tab,
.admin-tab,
.action-btn,
.approve-btn,
.reject-btn{
  border:none !important;
  border-radius:20px !important;
  padding:10px 20px !important;
  font-weight:900 !important;
  color:white !important;
  cursor:pointer !important;
  position:relative !important;
  overflow:hidden !important;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.55),
    inset 0 -5px 9px rgba(0,0,0,.22),
    0 5px 0 rgba(0,0,0,.18),
    0 9px 15px rgba(0,0,0,.18) !important;
  transition:.15s ease !important;
}

button::before,
.btn::before,
.tab::before,
.admin-tab::before,
.action-btn::before,
.approve-btn::before,
.reject-btn::before{
  content:"";
  position:absolute;
  top:-55%;
  left:-35%;
  width:90%;
  height:100%;
  background:linear-gradient(135deg,rgba(255,255,255,.65),rgba(255,255,255,.05));
  transform:rotate(25deg);
  pointer-events:none;
}

button:active,
.btn:active,
.tab:active,
.admin-tab:active,
.action-btn:active,
.approve-btn:active,
.reject-btn:active{
  transform:translateY(4px) scale(.98) !important;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.45),
  0 2px 0 rgba(0,0,0,.20) !important;
}

/* Approve green */
button[onclick*="approve"],
.approve-btn{
  background:linear-gradient(135deg,#00b75a,#20df83) !important;
}

/* Reject red */
button[onclick*="reject"],
.reject-btn{
  background:linear-gradient(135deg,#ff3030,#ff6b5f) !important;
}

/* Top menu buttons different colors */
button:nth-of-type(1){background:linear-gradient(135deg,#00b75a,#20df83) !important;}
button:nth-of-type(2){background:linear-gradient(135deg,#005bea,#29b6ff) !important;}

button:nth-of-type(4){background:linear-gradient(135deg,#ff7a00,#ffb300) !important;}

async function approveActivation(id, userId) {
  if (!confirm("Approve this activation request?")) return;

  let finalUserId = userId;

  if (userId.includes("ref=")) {
    finalUserId = userId.split("ref=")[1].split("&")[0];
  }

  const { error: userError } = await supabaseClient
    .from("users")
    .update({ status: "Active" })
    .eq("member_id", finalUserId);

  if (userError) {
    alert(userError.message);
    return;
  }

  await distributeLevelIncome(finalUserId);

  const { error } = await supabaseClient
    .from("activation_requests")
    .update({ status: "Approved" })
    .eq("id", id);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Activation Complete Successfully");
  loadActivationRequests();
}

async function distributeLevelIncome(userId) {
  const levelAmounts = [25, 10, 5, 5, 5];
  let currentMemberId = userId;

  for (let level = 1; level <= 5; level++) {
    const { data: currentUser } = await supabaseClient
      .from("users")
      .select("sponsor_id")
      .eq("member_id", currentMemberId)
      .single();

    if (!currentUser || !currentUser.sponsor_id) break;

    const sponsorId = currentUser.sponsor_id;
    const income = levelAmounts[level - 1];

    const { data: sponsorUser } = await supabaseClient
      .from("users")
      .select("wallet, lifetime_earning")
      .eq("member_id", sponsorId)
      .single();

    if (!sponsorUser) break;

    await supabaseClient
      .from("income_history")
      .insert({
        user_id: sponsorId,
        from_user_id: userId,
        level: level,
        amount: income,
        income_type: "level_income",
        status: "approved"
      });

    const oldWallet = Number(sponsorUser.wallet || 0);
const oldLifetime = Number(sponsorUser.lifetime_earning || 0);

await supabaseClient
.from("users")
.update({
  wallet: oldWallet + income,
  lifetime_earning: oldLifetime + income
})
.eq("member_id", sponsorId);
    currentMemberId = sponsorId;
  }
}

async function rejectActivation(id, userId) {
  if (!confirm("Reject this activation request? Is user se gayi level income sponsors ke wallet se cut ho jayegi.")) return;

  let finalUserId = userId;

  if (userId.includes("ref=")) {
    finalUserId = userId.split("ref=")[1].split("&")[0];
  }

  const { data: incomeRows, error: incomeError } = await supabaseClient
    .from("income_history")
    .select("*")
    .eq("from_user_id", finalUserId)
    .eq("income_type", "level_income")
    .eq("status", "approved");

  if (incomeError) {
    alert("Income history fetch error: " + incomeError.message);
    return;
  }

  if (incomeRows && incomeRows.length > 0) {
    for (const row of incomeRows) {
      const sponsorId = row.user_id;
      const amount = Number(row.amount || 0);

      const { data: sponsorUser, error: sponsorError } = await supabaseClient
        .from("users")
        .select("wallet, lifetime_earning")
        .eq("member_id", sponsorId)
        .single();

      if (sponsorError || !sponsorUser) {
        alert("Sponsor wallet fetch error: " + sponsorId);
        return;
      }

      const oldWallet = Number(sponsorUser.wallet || 0);
      const oldLifetime = Number(sponsorUser.lifetime_earning || 0);

      const newWallet = oldWallet - amount;
      const newLifetime = oldLifetime - amount;

      const { error: cutError } = await supabaseClient
        .from("users")
        .update({
          wallet: newWallet < 0 ? 0 : newWallet,
          lifetime_earning: newLifetime < 0 ? 0 : newLifetime
        })
        .eq("member_id", sponsorId);

      if (cutError) {
        alert("Wallet cut error: " + cutError.message);
        return;
      }

      await supabaseClient
        .from("income_history")
        .update({ status: "reversed" })
        .eq("id", row.id);
    }
  }

  const { error } = await supabaseClient
    .from("activation_requests")
    .update({ status: "Rejected" })
    .eq("id", id);

  if (error) {
    alert(error.message);
    return;
  }

  const { error: userRejectError } = await supabaseClient
    .from("users")
    .update({
      status: "Rejected",
      isActive: false
    })
    .eq("member_id", finalUserId);

  if (userRejectError) {
    alert("User status update error: " + userRejectError.message);
    return;
  }

  alert("Activation Rejected & Level Income Reversed Successfully");
  loadActivationRequests();
  }

async function rejectWithdraw(id){

  const { data: reqData, error: statusError } = await supabaseClient
    .from("withdrawal_requests")
    .update({
      status: "Rejected",
      refunded: true
    })
    .eq("id", id)
    .eq("status", "Pending")
    .eq("refunded", false)
    .select()
    .single();

  if(statusError || !reqData){
    alert("Ye request already processed hai");
    loadWithdrawals();
    return;
  }

  const { data: userData, error: userError } = await supabaseClient
    .from("users")
    .select("wallet")
    .eq("member_id", reqData.member_id)
    .single();

  if(userError || !userData){
    alert("User wallet fetch error");
    return;
  }

  const newWallet = Number(userData.wallet || 0) + Number(reqData.amount || 0);

  const { error: walletError } = await supabaseClient
    .from("users")
    .update({ wallet: newWallet })
    .eq("member_id", reqData.member_id);

  if(walletError){
    alert("Refund error: " + walletError.message);
    return;
  }

  alert("Withdrawal Rejected & Balance Refunded");
  loadWithdrawals();
}

async function approveRankReward(id){

  if(!confirm("Approve this rank reward? Wallet me reward add hoga.")) return;

  const claimRef = db.collection("rankRewardClaims").doc(id);
  const claimDoc = await claimRef.get();

  if(!claimDoc.exists){
    alert("Claim not found");
    return;
  }

  const claim = claimDoc.data();

  if(claim.status === "Approved" && claim.wallet_added === true){
    alert("Ye rank reward pehle se Approved hai. Wallet me dobara add nahi hoga.");
    return;
  }

  const memberId = claim.userId;
  const reward = Number(claim.reward || claim.amount || 0);
  const rank = claim.rank || "";

  if(!memberId || reward <= 0){
    alert("Invalid claim data");
    return;
  }

  const { data:user, error } = await supabaseClient
    .from("users")
    .select("wallet,current_rank")
    .eq("member_id", memberId)
    .single();

  if(error || !user){
    alert("User not found");
    return;
  }

  const oldWallet = Number(user.wallet || 0);
  const newWallet = oldWallet + reward;

  const { error:updateError } = await supabaseClient
    .from("users")
    .update({
      wallet: newWallet,
      current_rank: rank
    })
    .eq("member_id", memberId);

  if(updateError){
    alert("Wallet / Rank update error: " + updateError.message);
    return;
  }

  await claimRef.update({
    status: "Approved",
    wallet_added: true,
    approved_at: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Rank Reward Approved & Wallet Updated Successfully");
  loadRankRewardClaims();
}


async function rejectRankReward(id){

  if(!confirm("Reject this rank reward? Agar wallet me reward add hua hai to wapas cut ho jayega.")) return;

  const claimRef = db.collection("rankRewardClaims").doc(id);
  const claimDoc = await claimRef.get();

  if(!claimDoc.exists){
    alert("Claim not found");
    return;
  }

  const claim = claimDoc.data();

  const memberId = claim.userId;
  const reward = Number(claim.reward || claim.amount || 0);

  if(claim.status === "Approved" && claim.wallet_added === true){

    const { data:user, error } = await supabaseClient
      .from("users")
      .select("wallet")
      .eq("member_id", memberId)
      .single();

    if(error || !user){
      alert("User wallet fetch error");
      return;
    }

    const oldWallet = Number(user.wallet || 0);
    const newWallet = oldWallet - reward;

    if(newWallet < 0){
      alert("Wallet balance reward se kam hai. Pehle manually check karo.");
      return;
    }

    const { error:updateError } = await supabaseClient
      .from("users")
      .update({
        wallet: newWallet
      })
      .eq("member_id", memberId);

    if(updateError){
      alert("Wallet cut error: " + updateError.message);
      return;
    }
  }

  await claimRef.update({
    status: "Rejected",
    wallet_added: false,
    rejected_at: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Rank Reward Rejected. Agar reward add hua tha to wallet se cut ho gaya.");
  loadRankRewardClaims();
}

async function addBalance(userId) {
  const amount = parseFloat(prompt("Enter amount to add"));
  if (!amount || amount <= 0) return;

  const { data: userData, error: fetchError } = await supabaseClient
    .from("users")
    .select("wallet")
    .eq("member_id", userId)
    .single();

  if (fetchError || !userData) {
    alert("User wallet fetch error");
    return;
  }

  const newWallet = Number(userData.wallet || 0) + amount;

  const { error } = await supabaseClient
    .from("users")
    .update({ wallet: newWallet })
    .eq("member_id", userId);

  if (error) {
    alert("Balance add error: " + error.message);
    return;
  }

  alert("Balance added successfully");
  searchMember();
}

async function cutBalance(userId) {
  const amount = parseFloat(prompt("Enter amount to cut"));
  if (!amount || amount <= 0) return;

  const { data: userData, error: fetchError } = await supabaseClient
    .from("users")
    .select("wallet")
    .eq("member_id", userId)
    .single();

  if (fetchError || !userData) {
    alert("User wallet fetch error");
    return;
  }

  const oldWallet = Number(userData.wallet || 0);

  if (amount > oldWallet) {
    alert("User ke wallet me itna balance nahi hai");
    return;
  }

  const newWallet = oldWallet - amount;

  const { error } = await supabaseClient
    .from("users")
    .update({ wallet: newWallet })
    .eq("member_id", userId);

  if (error) {
    alert("Balance cut error: " + error.message);
    return;
  }

  alert("Balance cut successfully");
  searchMember();
}

async function viewUserWithdrawals(userId) {
  try {
    const snap = await db.collection("withdrawals")
      .where("userId", "==", userId)
      .get();

    if (snap.empty) {
      alert("No withdrawal requests found");
      return;
    }

    let text = "Withdrawal History:\n\n";

    snap.forEach(doc => {
      const d = doc.data();
      text +=
        "Amount: ₹" + d.amount + "\n" +
        "UPI: " + d.upiId + "\n" +
        "Status: " + d.status + "\n\n";
    });

    alert(text);

  } catch(error) {
    alert(error.message);
  }
}

async function viewUserReferrals(userId) {
  const userDoc = await db.collection("users").doc(userId).get();

  if (!userDoc.exists) {
    alert("User not found");
    return;
  }

  const data = userDoc.data();
  const list = data.joinedUsers || [];

  if (list.length === 0) {
    alert("No referrals found");
    return;
  }

  let text = "Referral List:\n\n";

  list.forEach((u, i) => {
    text +=
      (i + 1) + ". Name: " + (u.name || "N/A") + "\n" +
      "Mobile: " + (u.whatsapp || "N/A") + "\n" +
      "Email: " + (u.email || "N/A") + "\n" +
      "Status: " + (u.status || "N/A") + "\n\n";
  });

  alert(text);
}

async function approveOffer(submissionId, userId, reward) {
  if (!confirm("Approve this offer request?")) return;

  const { data: oldReq, error: oldReqError } = await supabaseClient
    .from("offer_submissions")
    .select("status")
    .eq("id", submissionId)
    .maybeSingle();

  if (oldReqError) {
    alert("Request check error: " + oldReqError.message);
    return;
  }

  if (oldReq && oldReq.status === "Approved") {
    alert("Ye offer pehle se Approved hai. Wallet me dobara point add nahi honge.");
    return;
  }

  const { data: userData, error: userError } = await supabaseClient
    .from("users")
    .select("wallet, lifetime_earning")
    .eq("member_id", userId)
    .maybeSingle();

  if (userError) {
    alert("User wallet error: " + userError.message);
    return;
  }
if (!userData) {
  alert("User not found in users table. Member ID match nahi ho rahi: " + userId);
  return;
}
  const oldWallet = Number(userData.wallet || 0);
  const addReward = Number(reward || 0);

  const oldLifetime = Number(userData.lifetime_earning || 0);

const { error: walletError } = await supabaseClient
  .from("users")
  .update({
    wallet: oldWallet + addReward,
    lifetime_earning: oldLifetime + addReward
  })
  .eq("member_id", userId);

  if (walletError) {
    alert("Wallet update error: " + walletError.message);
    return;
  }

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/offer_submissions?id=eq." + submissionId,
    {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=representation"
      },
      body: JSON.stringify({
        status: "Approved"
      })
    }
  );

  const result = await res.text();

  if (!res.ok) {
    alert("Approve Error: " + result);
    return;
  }

  alert("Offer Approved Successfully & Wallet Updated");
  loadOfferRequests();
}

async function rejectOffer(submissionId, userId) {
  if (!confirm("Reject this offer request?")) return;

  const res = await fetch(
    SUPABASE_URL + "/rest/v1/offer_submissions?id=eq." + submissionId,
    {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=representation"
      },
      body: JSON.stringify({
        status: "Rejected"
      })
    }
  );

  const result = await res.text();

  if (!res.ok) {
    alert("Reject Error: " + result);
    return;
  }

  alert("Offer Rejected Successfully");
  loadOfferRequests();
}
