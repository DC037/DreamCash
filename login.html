<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Cash Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f766e,#0ea5e9);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.box{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:24px;
  padding:22px;
  box-shadow:0 12px 35px rgba(0,0,0,.25);
}
.logo{
  text-align:center;
  margin-bottom:18px;
}
.logo img{
  width:150px;
  max-width:100%;
  border-radius:15px;
}
.logo h1{
  color:#0f766e;
  font-size:28px;
  margin-top:8px;
}
.tabs{
  display:flex;
  background:#e0f2fe;
  border-radius:30px;
  padding:5px;
  margin-bottom:18px;
}
.tabs button{
  flex:1;
  border:none;
  padding:12px;
  border-radius:25px;
  font-weight:bold;
  background:transparent;
  color:#075985;
}
.tabs button.active{
  background:linear-gradient(135deg,#15803d,#22c55e);
  color:white;
}
.form{display:none}
.form.active{display:block}
.input{
  width:100%;
  padding:13px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:14px;
  font-size:15px;
}
.check{
  display:flex;
  gap:8px;
  font-size:13px;
  color:#555;
  margin:10px 0;
}
.btn{
  width:100%;
  border:none;
  padding:13px;
  border-radius:25px;
  background:linear-gradient(135deg,#15803d,#22c55e);
  color:white;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}
.note{
  text-align:center;
  font-size:12px;
  color:#666;
  margin-top:14px;
}
.link{
  color:#0284c7;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

  <div class="logo">
    <img src="logo.png" alt="Dream Cash Logo">
    <h1>Dream Cash</h1>
  </div>

  <div class="tabs">
    <button id="loginTab" class="active" onclick="showLogin()">Login</button>
    <button id="registerTab" onclick="showRegister()">Register</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm" class="form active">
    <input class="input" type="tel" placeholder="Mobile / WhatsApp Number">
    <input class="input" type="password" placeholder="Password">
    <button class="btn">Login</button>
    <p class="note">New user? <span class="link" onclick="showRegister()">Create Account</span></p>
  </div>

  <!-- Registration Form -->
  <div id="registerForm" class="form">
    <input class="input" type="text" placeholder="Full Name">
    <input class="input" type="tel" placeholder="WhatsApp Number">
    <input class="input" type="email" placeholder="Email ID">
    <input class="input" type="password" placeholder="Password">
    <input class="input" type="password" placeholder="Confirm Password">
<input class="input" type="text" id="referralCode" placeholder="Referral Code">
    <label class="check">
      <input type="checkbox">
      <span>I agree to the Terms & Conditions of Dream Cash.</span>
    </label>

    <button class="btn">Register</button>
    <p class="note">Already have an account? <span class="link" onclick="showLogin()">Login</span></p>
  </div>

</div>

<script>
function showLogin(){
  document.getElementById("loginForm").classList.add("active");
  document.getElementById("registerForm").classList.remove("active");
  document.getElementById("loginTab").classList.add("active");
  document.getElementById("registerTab").classList.remove("active");
}

function showRegister(){
  document.getElementById("registerForm").classList.add("active");
  document.getElementById("loginForm").classList.remove("active");
  document.getElementById("registerTab").classList.add("active");
  document.getElementById("loginTab").classList.remove("active");
}
  const params = new URLSearchParams(window.location.search);
const refCode = params.get("ref");

if (refCode) {
    document.getElementById("referralCode").value = refCode;
}
</script>

</body>
</html>
