<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Cash Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#0f766e,#0ea5e9);display:flex;align-items:center;justify-content:center;padding:18px}
.box{width:100%;max-width:430px;background:white;border-radius:24px;padding:22px;box-shadow:0 12px 35px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:18px}
.logo img{width:150px;max-width:100%;border-radius:15px}
.logo h1{color:#0f766e;font-size:28px;margin-top:8px}
.tabs{display:flex;background:#e0f2fe;border-radius:30px;padding:5px;margin-bottom:18px}
.tabs button{flex:1;border:none;padding:12px;border-radius:25px;font-weight:bold;background:transparent;color:#075985}
.tabs button.active{background:linear-gradient(135deg,#15803d,#22c55e);color:white}
#loginForm{display:block}
#registerForm{display:none}
.input{width:100%;padding:13px;margin:8px 0;border:1px solid #ddd;border-radius:14px;font-size:15px}
.check{display:flex;gap:8px;font-size:13px;color:#555;margin:10px 0}
.btn{width:100%;border:none;padding:13px;border-radius:25px;background:linear-gradient(135deg,#15803d,#22c55e);color:white;font-size:16px;font-weight:bold;margin-top:10px}
.note{text-align:center;font-size:12px;color:#666;margin-top:14px}
.link{color:#0284c7;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<div class="box">
  <div class="logo">
    <img src="https://i.ibb.co/HTXJc9Kr/fa7557b3-82e2-47d3-b873-139b872fa4a5.png" alt="Dream Cash Logo">
    <h1>Dream Cash</h1>
  </div>

  <div class="tabs">
  <button id="loginTab" class="active" onclick="showLogin()">Login</button>

  <button id="registerTab" onclick="showRegister()">Register</button>
</div>

<div id="loginForm" class="form active" style="display:block;">
  <input id="loginMobile" class="input" type="tel" placeholder="Mobile / WhatsApp Number">
  <input id="loginPassword" class="input" type="password" placeholder="Password">
  <button class="btn" onclick="loginUser()">Login</button>
  <p class="note">New user? <span class="link" onclick="showRegister()">Create Account</span></p>
</div>

<div id="registerForm" class="form" style="display:none;">
    
    <input id="fullName" class="input" type="text" placeholder="Full Name">
    <input id="whatsapp" class="input" type="tel" placeholder="WhatsApp Number">
    <input id="email" class="input" type="email" placeholder="Email ID">
    <input id="password" class="input" type="password" placeholder="Password">
    <input id="confirmPassword" class="input" type="password" placeholder="Confirm Password">
    <input id="referralCode" class="input" type="text" placeholder="Referral Code">

    <label class="check">
      <input id="terms" type="checkbox">
      <span>I agree to the Terms & Conditions of Dream Cash.</span>
    </label>

    <button class="btn" onclick="registerUser()">Register</button>
    <p class="note">Already have an account? <span class="link" onclick="showLogin()">Login</span></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVIHJ66pEI6A3HmSma0LNsFanatv-yhic",
  authDomain: "dreamcash-dafb4.firebaseapp.com",
  projectId: "dreamcash-dafb4",
  storageBucket: "dreamcash-dafb4.firebasestorage.app",
  messagingSenderId: "66002195487",
  appId: "1:66002195487:web:6fb777fca2630c466a312a"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
  
function showLogin(){
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("registerForm").style.display = "none";
  document.getElementById("loginTab").classList.add("active");
  document.getElementById("registerTab").classList.remove("active");
}

function showRegister(){
    document.getElementById("registerForm").style.display = "block";
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerTab").classList.add("active");
    document.getElementById("loginTab").classList.remove("active");
}

const params = new URLSearchParams(window.location.search);
const refCode = params.get("ref");

if(refCode){
    setTimeout(function(){
        showRegister();
        document.getElementById("referralCode").value = refCode;
    }, 500);
}

async function registerUser(){
  const fullName = document.getElementById("fullName").value.trim();
  const whatsapp = document.getElementById("whatsapp").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const referralCode = document.getElementById("referralCode").value.trim();
  const terms = document.getElementById("terms").checked;

  if(!fullName || !whatsapp || !email || !password || !confirmPassword){
    alert("Please fill all details");
    return;
  }

  if(password !== confirmPassword){
    alert("Password and Confirm Password not match");
    return;
  }

  if(!terms){
    alert("Please accept Terms & Conditions");
    return;
  }

  try{
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    const uid = userCredential.user.uid;
    const myReferralCode = (whatsapp.slice(-6) + uid.slice(0,4)).toUpperCase();

    await db.collection("users").doc(uid).set({
  fullName: fullName,
  whatsapp: whatsapp,
  email: email,
  referredBy: referralCode || "",
  myReferralCode: myReferralCode,
  balance: 0,
  referralCount: 0,
  referralIncome: 0,
  joinedUsers: [],
  status: "Inactive",
  createdAt: firebase.firestore.FieldValue.serverTimestamp()
});

if(referralCode){
  const refSnap = await db.collection("users")
    .where("myReferralCode", "==", referralCode)
    .limit(1)
    .get();

  if(!refSnap.empty){
    const refDoc = refSnap.docs[0];

    await db.collection("users").doc(refDoc.id).update({
      referralCount: firebase.firestore.FieldValue.increment(1),
      joinedUsers: firebase.firestore.FieldValue.arrayUnion({
        name: fullName,
        whatsapp: whatsapp,
        email: email,
        status: "Inactive",
        joinedAt: new Date().toISOString()
      })
    });
  }
}

    alert("Registration successful");
    window.location.href = "dashboard.html";
  }catch(error){
    alert(error.message);
  }
}

async function loginUser(){
  const mobile = document.getElementById("loginMobile").value.trim();
  const password = document.getElementById("loginPassword").value;

  if(!mobile || !password){
    alert("Enter mobile number and password");
    return;
  }

  try{
    const snap = await db.collection("users").where("whatsapp", "==", mobile).limit(1).get();

    if(snap.empty){
      alert("Mobile number not registered");
      return;
    }

    const userData = snap.docs[0].data();
    await auth.signInWithEmailAndPassword(userData.email, password);

    alert("Login successful");
    window.location.href = "dashboard.html";
  }catch(error){
    alert(error.message);
  }
}
</script>
</body>
</html>
