<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Cash Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#0f766e,#0ea5e9);display:flex;align-items:center;justify-content:center;padding:18px}
.box{width:100%;max-width:430px;background:white;border-radius:24px;padding:22px;box-shadow:0 12px 35px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:18px}
.logo img{width:150px;max-width:100%;border-radius:15px}
.logo h1{color:#0f766e;font-size:28px;margin-top:8px}
.tabs{display:flex;background:#e0f2fe;border-radius:30px;padding:5px;margin-bottom:18px}
.tabs button{flex:1;border:none;padding:12px;border-radius:25px;font-weight:bold;background:transparent;color:#075985}
.tabs button.active{background:linear-gradient(135deg,#15803d,#22c55e);color:white}
#loginForm{display:block}
#registerForm{display:none}
.input{width:100%;padding:13px;margin:8px 0;border:1px solid #ddd;border-radius:14px;font-size:15px}
.check{display:flex;gap:8px;font-size:13px;color:#555;margin:10px 0}
.btn{width:100%;border:none;padding:13px;border-radius:25px;background:linear-gradient(135deg,#15803d,#22c55e);color:white;font-size:16px;font-weight:bold;margin-top:10px}
.note{text-align:center;font-size:12px;color:#666;margin-top:14px}
.link{color:#0284c7;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<div class="box">
  <div class="logo">
    <img src="https://i.ibb.co/HTXJc9Kr/fa7557b3-82e2-47d3-b873-139b872fa4a5.png" alt="Dream Cash Logo">
    <h1>Dream Cash</h1>
  </div>

  <div class="tabs">
  <button id="loginTab" class="active" onclick="showLogin()">Login</button>

  <button id="registerTab" onclick="showRegister()">Register</button>
</div>

<div id="loginForm" class="form active" style="display:block;">
  <input id="loginMobile" class="input" type="tel" placeholder="Mobile / WhatsApp Number">
  <input id="loginPassword" class="input" type="password" placeholder="Password">
  <button class="btn" onclick="loginUser()">Login</button>
  <p class="note">New user? <span class="link" onclick="showRegister()">Create Account</span></p>
<p style="text-align:right;margin-top:8px;">
  <span class="link" onclick="forgotPassword()">Forgot Password?</span>
</p>
</div>

<div id="registerForm" class="form" style="display:none;">
    
    <input id="fullName" class="input" type="text" placeholder="Full Name">
    <input id="whatsapp" class="input" type="tel" placeholder="WhatsApp Number">
    <input id="email" class="input" type="email" placeholder="Email ID">
    <input id="password" class="input" type="password" placeholder="Password">
    <input id="confirmPassword" class="input" type="password" placeholder="Confirm Password">
    <input id="referralCode" class="input" type="text" placeholder="Referral Code" oninput="checkUplineName()">
<div id="uplineName" style="font-size:13px;color:green;font-weight:bold;margin:-8px 0 10px 8px;"></div>
    <label class="check">
      <input id="terms" type="checkbox">
      <span>I agree to the Terms & Conditions of Dream Cash.</span>
    </label>

    <button class="btn" onclick="registerUser()">Register</button>
    <p class="note">Already have an account? <span class="link" onclick="showLogin()">Login</span></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function showLogin(){
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("registerForm").style.display = "none";

  document.getElementById("loginTab").classList.add("active");
  document.getElementById("registerTab").classList.remove("active");
}

function showRegister(){
  document.getElementById("registerForm").style.display = "block";
  document.getElementById("loginForm").style.display = "none";

  document.getElementById("registerTab").classList.add("active");
  document.getElementById("loginTab").classList.remove("active");
}
  const params = new URLSearchParams(window.location.search);
const refCode = params.get("ref");

async function checkUplineName() {
  const code = document.getElementById("referralCode").value.trim();
  const box = document.getElementById("uplineName");

  if (!code) {
    box.innerText = "";
    return;
  }

  const { data } = await supabaseClient
    .from("users")
    .select("name")
    .eq("member_id", code)
    .limit(1);

  if (data && data.length > 0) {
    box.innerText = "Upline: " + data[0].name + " ✅";
    box.style.color = "green";
  } else {
    box.innerText = "Invalid Referral Code";
    box.style.color = "red";
  }
}

if (refCode) {
  setTimeout(() => {
    showRegister();
    document.getElementById("referralCode").value = refCode;
    checkUplineName();
  }, 500);
}
  async function registerUser(){

  const fullName = document.getElementById("fullName").value.trim();
  const whatsapp = document.getElementById("whatsapp").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if(!fullName || !whatsapp || !email || !password){
    alert("Please fill all details");
    return;
  }

  if(password !== confirmPassword){
    alert("Passwords do not match");
    return;
  }

  const { error: authError } = await supabaseClient.auth.signUp({
    email: email,
    password: password
  });

  if(authError){
    alert(authError.message);
    return;
  }

  const { error } = await supabaseClient
    .from("users")
    .insert([{
      id: Date.now(),
      member_id: "DC1001",
      name: fullName,
      email: email,
      mobile: whatsapp,
      sponsor_id: document.getElementById("referralCode").value.trim(),
      wallet: 0,
      status: "Inactive"
    }]);

  if(error){
    alert(error.message);
    return;
  }

  alert("Registration Successful");
    window.location.href = "dashboard.html";
  }
  async function loginUser(){

  const mobile = document.getElementById("loginMobile").value.trim();
  const password = document.getElementById("loginPassword").value;

  if(!mobile || !password){
    alert("Enter mobile number and password");
    return;
  }

  const { data, error } = await supabaseClient
    .from("users")
    .select("email, mobile")
    .eq("mobile", mobile)
    .limit(1);

  if(error || !data || data.length === 0){
    alert("Mobile number not registered");
    return;
  }

  const userEmail = data[0].email;

  const { error: loginError } = await supabaseClient.auth.signInWithPassword({
    email: userEmail,
    password: password
  });

  if(loginError){
    alert(loginError.message);
    return;
  }

  window.location.href = "dashboard.html";
}

async function forgotPassword(){
  const email = prompt("Enter your registered Email ID");
  if(!email) return;

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email);

  if(error){
    alert(error.message);
  }else{
    alert("Password reset link sent to your email.");
  }
}
</script>
</body>
</html>
