<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamCash - Special Task</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f7fb;
}

.header{
  background:#2563eb;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  text-align:center;
}

.card h2{
  margin-bottom:10px;
}

.card p{
  color:#666;
  margin-bottom:20px;
}

.back-btn{
  display:block;
  margin-top:20px;
  text-align:center;
  background:#111827;
  color:#fff;
  text-decoration:none;
  padding:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
⭐ Special Task
</div>

<div class="container">

<div class="card">

<h2>🔥 TimeWall OfferWall</h2>

<p>
Complete offers and earn DreamCash automatically.
</p>

<button
id="timewallBtn"
style="width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;">
🚀 Open TimeWall
</button>

</div>

<a href="offerwall.html" class="back-btn">
⬅ Back To Offer Wall
</a>

</div>
<script>
const memberId =
  localStorage.getItem("member_id") ||
  localStorage.getItem("last_member_id");

document.getElementById("timewallBtn").addEventListener("click", function () {

  if (!memberId) {
    alert("Member ID not found. Please login again.");
    return;
  }

  const url =
    "https://timewall.io/users/login?oid=51de77a4d9885033&uid=" +
    encodeURIComponent(memberId);

  window.open(url, "_blank");
});
</script>
</body>
</html>
