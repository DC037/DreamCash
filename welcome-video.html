<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To DreamCash</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#videoContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

#skipBtn{
position:absolute;
top:20px;
right:20px;
padding:10px 18px;
border:none;
border-radius:30px;
background:#ffffffdd;
color:#000;
font-size:15px;
font-weight:bold;
cursor:pointer;
z-index:9999;
}
</style>
</head>

<body>

<div id="videoContainer">

<video
id="welcomeVideo"
autoplay
playsinline
controls
>
<source src="https://baqgiuxvscffmtvhceqk.supabase.co/storage/v1/object/public/videos/km_20260711_1440p_50f_20260711_222710.mp4" type="video/mp4">
</video>

<button id="skipBtn">
Skip
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY="sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const video=document.getElementById("welcomeVideo");
const skip=document.getElementById("skipBtn");

const memberId=new URLSearchParams(window.location.search).get("member_id");

async function finishWelcome(){

if(memberId){

await supabaseClient
.from("users")
.update({
welcome_video_seen:true
})
.eq("member_id",memberId);

}

window.location.replace(
"dashboard.html?member_id="+memberId
);

}

skip.onclick=finishWelcome;

video.onended=finishWelcome;

video.play().catch(()=>{});

</script>

</body>
</html>
