<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Offer Approval</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}

.card{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

img{
width:100%;
max-width:300px;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}
</style>
</head>

<body>

<h2>Pending Offer Submissions</h2>

<div id="list">Loading...</div>
<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

async function loadPending(){
  const res = await fetch(SUPABASE_URL + "/rest/v1/offer_submissions?status=eq.pending&select=*", {
    headers:{
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  let html = "";

  data.forEach(item => {
    html += `
      <div class="card">
        <p><b>User:</b> ${item.user_id}</p>
        <p><b>Reward:</b> ${item.reward}</p>
        <p><b>Status:</b> ${item.status}</p>
        <img src="${item.screenshot_url}">
        <br>
        <button class="approve">Approve</button>
        <button class="reject">Reject</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "No pending submissions";
}

loadPending();
</script>
</body>
</html>
