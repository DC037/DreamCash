<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Offer Approval</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}

.card{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

img{
width:100%;
max-width:300px;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}
.search-box{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:12px;
}

.admin-menu{
display:flex;
gap:8px;
overflow-x:auto;
margin-bottom:15px;
}

.admin-menu button{
white-space:nowrap;
color:white;
font-weight:bold;
}

.btn-offer{background:#16a34a;}
.btn-activation{background:#2563eb;}
.btn-withdraw{background:#7c3aed;}
.btn-rank{background:#f97316;}
.btn-users{background:#111827;}
.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}
</style>
</head>

<body>
<input
  type="text"
  id="searchBox"
  class="search-box"
  placeholder="Search user by ID or name">

<div class="admin-menu">
  <button class="btn-offer" onclick="loadPending()">Offer Requests</button>
  <button class="btn-activation" onclick="showSection('Activation Requests')">Activation Requests</button>
  <button class="btn-withdraw" onclick="showSection('Withdraw Requests')">Withdraw Requests</button>
  <button class="btn-rank" onclick="showSection('Rank Records')">Rank Records</button>
  <button class="btn-users" onclick="showSection('Users')">Users</button>
</div>
<h2>Pending Offer Submissions</h2>

<div id="list">Loading...</div>
<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

async function loadPending(){
  const res = await fetch(SUPABASE_URL + "/rest/v1/offer_submissions?status=eq.pending&select=*", {
    headers:{
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  let html = "";

  data.forEach(item => {
    html += `
      <div class="card">
        <p><b>User:</b> ${item.user_id}</p>
        <p><b>Reward:</b> ${item.reward}</p>
        <p><b>Status:</b> ${item.status}</p>
        <img src="${item.screenshot_url}">
        <br>
        <button class="approve">Approve</button>
        <button class="reject">Reject</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "No pending submissions";
}
function showSection(name){
  document.getElementById("list").innerHTML =
    "<div class='card'><b>" + name + "</b><br>Coming soon...</div>";
}
loadPending();
</script>
</body>
</html>
