<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Dream Cash</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f766e,#0ea5e9);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.box{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:24px;
  padding:22px;
  box-shadow:0 12px 35px rgba(0,0,0,.25);
}
h1{
  color:#0f766e;
  text-align:center;
  margin-bottom:15px;
}
.input{
  width:100%;
  padding:13px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:14px;
  font-size:15px;
}
.btn{
  width:100%;
  border:none;
  padding:13px;
  border-radius:25px;
  background:linear-gradient(135deg,#15803d,#22c55e);
  color:white;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}
.note{
  text-align:center;
  font-size:13px;
  color:#666;
  margin-top:14px;
}
</style>
</head>

<body>

<div class="box">
  <h1>Reset Password</h1>

  <input id="newPassword" class="input" type="password" placeholder="New Password">
  <input id="confirmPassword" class="input" type="password" placeholder="Confirm Password">

  <button class="btn" onclick="updatePassword()">Update Password</button>

  <p class="note">After password update, login again with your new password.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://baqgiuxvscffmtvhceqk.supabase.co";
const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function updatePassword(){
  const newPassword = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if(!newPassword || !confirmPassword){
    alert("Please enter password");
    return;
  }

  if(newPassword.length < 6){
    alert("Password minimum 6 characters hona chahiye");
    return;
  }

  if(newPassword !== confirmPassword){
    alert("Passwords do not match");
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({
    password: newPassword
  });

  if(error){
    alert("Password update error: " + error.message);
    return;
  }

  alert("Password updated successfully. Please login again.");
  window.location.href = "login.html";
}
</script>

</body>
</html>
