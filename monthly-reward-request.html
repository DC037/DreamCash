<!DOCTYPE html>
<html>
<head>

<title>Monthly Reward Requests - DreamCash Admin</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,#08111f,#0b1730,#132d63);

min-height:100vh;

padding:15px;

color:#fff;

}

h2{

margin-bottom:20px;

font-size:28px;

font-weight:bold;

color:#fff;

text-shadow:0 2px 8px #000;

}

.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.10);

border-radius:18px;

padding:18px;

margin-bottom:18px;

box-shadow:

0 10px 30px rgba(0,0,0,.35),

inset 0 1px 0 rgba(255,255,255,.12);

}

.btn{

border:none;

padding:12px 22px;

border-radius:30px;

font-size:15px;

font-weight:900;

color:#fff;

cursor:pointer;

position:relative;

overflow:hidden;

box-shadow:

inset 0 2px 4px rgba(255,255,255,.45),

inset 0 -4px 8px rgba(0,0,0,.25),

0 6px 0 rgba(0,0,0,.25),

0 12px 20px rgba(0,0,0,.35);

transition:.15s;

}

.btn:active{

transform:translateY(4px);

box-shadow:

0 2px 0 rgba(0,0,0,.3);

}

.btn::before{

content:"";

position:absolute;

top:-60%;

left:-30%;

width:90%;

height:100%;

background:

linear-gradient(

135deg,

rgba(255,255,255,.65),

rgba(255,255,255,0)

);

transform:rotate(25deg);

}

.backBtn{

background:

linear-gradient(135deg,#6a11cb,#8b5cf6);

}

.green{

background:

linear-gradient(135deg,#00b75a,#1fe282);

}

.red{

background:

linear-gradient(135deg,#ff3131,#ff6868);

}

.orange{

background:

linear-gradient(135deg,#ff8a00,#ffbf00);

}

.status{

font-weight:bold;

}

.status.pending{

color:#ffc107;

}

.status.approved{

color:#28e96d;

}

.status.rejected{

color:#ff5a5a;

}

.requestBox{

margin-top:15px;

}

</style>

</head>

<body>

<h2>🎁 Monthly Reward Requests</h2>

<div class="card">

<button class="btn backBtn"

onclick="window.location.href='admin.html'">

⬅ Back To Admin

</button>

</div>

<div class="card">

<h3 style="margin-bottom:15px;">

Monthly Reward Request List

</h3>

<div id="monthlyRewardList">

Loading...

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
async function loadMonthlyRewardClaims(){

const box=document.getElementById("monthlyRewardList");

box.innerHTML="<center>Loading Requests...</center>";

const {data,error}=await supabaseClient
.from("monthly_reward_claims")
.select("*")
.order("claim_date",{ascending:false})

if(error){

box.innerHTML="<center style='color:#ff5a5a'>"+error.message+"</center>";

return;

}

if(!data || data.length===0){

box.innerHTML="<center>No Monthly Reward Requests</center>";

return;

}

let html="";

data.forEach(item=>{

const statusClass=

item.status==="Approved"

?"approved"

:item.status==="Rejected"

?"rejected"

:"pending";

html+=`

<div class="card requestBox">

<div style="line-height:1.9">

<b>👤 Name :</b>

${item.user_name||"-"}

<br>

<b>🆔 Member ID :</b>

${item.user_id}

<br>

<b>📅 Month :</b>

${item.month}

<br>

<b>🏆 Rank :</b>

#${item.rank}

<br>

<b>💰 Monthly Earning :</b>

${item.monthly_earning} DC

<br>

<b>🎁 Reward :</b>

${item.reward_amount} DC

<br>

<b>🕒 Date & Time :</b>

${item.claim_date ?

new Date(item.claim_date)

.toLocaleString()

:"-"}

<br>

<b>Status :</b>

<span class="status ${statusClass}">

${item.status}

</span>

</div>

<br>

<button

class="btn green"

onclick="approveMonthlyReward('${item.id}')">

✔ Approve

</button>

<button

class="btn red"

style="margin-left:10px"

onclick="rejectMonthlyReward('${item.id}')">

✖ Reject

</button>

</div>

`;

});

box.innerHTML=html;

}
  async function approveMonthlyReward(id){

if(!confirm("Approve this Monthly Reward Request?")) return;

const {data:claim,error}=await supabaseClient
.from("monthly_reward_claims")
.select("*")
.eq("id",id)
.single();

if(error || !claim){

alert("Request Not Found");

return;

}

if(claim.status==="Approved"){

alert("Already Approved");

return;

}

const {data:user,error:userError}=await supabaseClient
.from("users")
.select("wallet")
.eq("member_id",claim.user_id)
.single();

if(userError || !user){

alert("User Not Found");

return;

}

const newWallet=
Number(user.wallet||0)+
Number(claim.reward_amount||0);

const {error:updateWalletError}=await supabaseClient
.from("users")
.update({
wallet:newWallet
})
.eq("member_id",claim.user_id);

if(updateWalletError){

alert(updateWalletError.message);

return;

}

const {error:updateStatusError}=await supabaseClient
.from("monthly_reward_claims")
.update({
status:"Approved"
})
.eq("id",id);

if(updateStatusError){

alert(updateStatusError.message);

return;

}

alert("✅ Monthly Reward Approved Successfully");

loadMonthlyRewardClaims();

  }
  async function rejectMonthlyReward(id){

if(!confirm("Reject this Monthly Reward Request?")) return;

const {error}=await supabaseClient
.from("monthly_reward_claims")
.update({
status:"Rejected"
})
.eq("id",id);

if(error){

alert(error.message);

return;

}

alert("❌ Monthly Reward Rejected Successfully");

loadMonthlyRewardClaims();

}

loadMonthlyRewardClaims();

</script>

</body>

</html>
