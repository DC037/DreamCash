<!DOCTYPE html>
<html>
<head>
<title>Monthly Reward - DreamCash Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#eef3f7;
margin:0;
padding:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 10px #0001;
}

h2{
color:#0b6b7a;
}

.btn{
border:none;
padding:10px 18px;
border-radius:20px;
color:#fff;
font-weight:bold;
cursor:pointer;
margin:5px;
}

.green{
background:#16c784;
}

.red{
background:#ef4444;
}

</style>

</head>

<body>

<h2>🎁 Monthly Reward Claims</h2>

<div class="card">

<button class="btn green"
onclick="window.location.href='admin.html'">
⬅ Back To Admin
</button>

</div>

<div class="card">

<div id="monthlyRewardList">

Loading...

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://baqgiuxvscffmtvhceqk.supabase.co";

const SUPABASE_KEY = "sb_publishable_M-R7U0rWY2JPMefvZpAQRw_mj1phJ_l";

const supabaseClient=
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
async function loadMonthlyRewardClaims(){

const box=document.getElementById("monthlyRewardList");

box.innerHTML="Loading...";

const {data,error}=await supabaseClient
.from("monthly_reward_claims")
.select("*")
.order("created_at",{ascending:false});

if(error){
box.innerHTML="<span style='color:red'>"+error.message+"</span>";
return;
}

if(!data || data.length===0){
box.innerHTML="No Monthly Reward Requests";
return;
}

let html="";

for(const item of data){

html+=`

<div class="card" style="margin-bottom:15px;">

<b>Name:</b> ${item.name || "-"}<br>

<b>Member ID:</b> ${item.member_id}<br>

<b>Month:</b> ${item.month}<br>

<b>Rank:</b> #${item.rank}<br>

<b>Monthly Earning:</b> ${item.monthly_earning} DC<br>

<b>Reward:</b>

<span style="color:#22c55e;font-weight:bold;">

${item.reward} DC

</span>

<br>

<b>Status:</b>

<span style="color:${item.status=="Approved"?"#22c55e":item.status=="Rejected"?"red":"orange"};font-weight:bold;">

${item.status}

</span>

<br><br>

<button class="btn green"

onclick="approveMonthlyReward('${item.id}')">

Approve

</button>

<button class="btn red"

onclick="rejectMonthlyReward('${item.id}')">

Reject

</button>

</div>

`;

}

box.innerHTML=html;

}

async function approveMonthlyReward(id){

if(!confirm("Approve this monthly reward request?")) return;

const {data:claim,error}=await supabaseClient
.from("monthly_reward_claims")
.select("*")
.eq("id",id)
.single();

if(error || !claim){
alert("Claim not found");
return;
}

if(claim.status==="Approved"){
alert("Already approved");
return;
}

const {data:user}=await supabaseClient
.from("users")
.select("wallet")
.eq("member_id",claim.member_id)
.single();

const newWallet=
Number(user.wallet||0)+
Number(claim.reward||0);

await supabaseClient
.from("users")
.update({
wallet:newWallet
})
.eq("member_id",claim.member_id);

await supabaseClient
.from("monthly_reward_claims")
.update({
status:"Approved"
})
.eq("id",id);

alert("Monthly Reward Approved");

loadMonthlyRewardClaims();

}

async function rejectMonthlyReward(id){

if(!confirm("Reject this monthly reward request?")) return;

await supabaseClient
.from("monthly_reward_claims")
.update({
status:"Rejected"
})
.eq("id",id);

alert("Monthly Reward Rejected");
loadMonthlyRewardClaims();

</script>

</body>
</html>
