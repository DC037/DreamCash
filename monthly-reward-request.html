<!DOCTYPE html>
<html>
<head>

<title>Monthly Reward Requests - DreamCash Admin</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,#08111f,#0b1730,#132d63);

min-height:100vh;

padding:15px;

color:#fff;

}

h2{

margin-bottom:20px;

font-size:28px;

font-weight:bold;

color:#fff;

text-shadow:0 2px 8px #000;

}

.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.10);

border-radius:18px;

padding:18px;

margin-bottom:18px;

box-shadow:

0 10px 30px rgba(0,0,0,.35),

inset 0 1px 0 rgba(255,255,255,.12);

}

.btn{

border:none;

padding:12px 22px;

border-radius:30px;

font-size:15px;

font-weight:900;

color:#fff;

cursor:pointer;

position:relative;

overflow:hidden;

box-shadow:

inset 0 2px 4px rgba(255,255,255,.45),

inset 0 -4px 8px rgba(0,0,0,.25),

0 6px 0 rgba(0,0,0,.25),

0 12px 20px rgba(0,0,0,.35);

transition:.15s;

}

.btn:active{

transform:translateY(4px);

box-shadow:

0 2px 0 rgba(0,0,0,.3);

}

.btn::before{

content:"";

position:absolute;

top:-60%;

left:-30%;

width:90%;

height:100%;

background:

linear-gradient(

135deg,

rgba(255,255,255,.65),

rgba(255,255,255,0)

);

transform:rotate(25deg);

}

.backBtn{

background:

linear-gradient(135deg,#6a11cb,#8b5cf6);

}

.green{

background:

linear-gradient(135deg,#00b75a,#1fe282);

}

.red{

background:

linear-gradient(135deg,#ff3131,#ff6868);

}

.orange{

background:

linear-gradient(135deg,#ff8a00,#ffbf00);

}

.status{

font-weight:bold;

}

.status.pending{

color:#ffc107;

}

.status.approved{

color:#28e96d;

}

.status.rejected{

color:#ff5a5a;

}

.requestBox{

margin-top:15px;

}

</style>

</head>
